<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shoe Check Multi-Language</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary: #007AFF; --success: #34C759; --bg: #f2f2f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1c1c1e; }
        .card { background: white; padding: 20px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        
        .header-logo { text-align: right; margin-bottom: 10px; }
        .header-logo img { max-width: 120px; height: auto; border-radius: 5px; }

        .lang-switch { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .lang-btn { padding: 8px 15px; border-radius: 8px; border: 1px solid var(--primary); background: white; color: var(--primary); font-weight: bold; cursor: pointer; }
        .lang-btn.active { background: var(--primary); color: white; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 11px; color: #8e8e93; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #d1d1d6; border-radius: 10px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; }
        
        .btn-link { display: block; background: var(--success); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-size: 13px; font-weight: 700; text-align: center; text-decoration: none; margin: 15px 0; box-sizing: border-box; }
        
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .photo-item { background: #f9f9fb; border: 1px dashed #c7c7cc; border-radius: 10px; padding: 12px 5px; text-align: center; position: relative; font-size: 12px; color: #555; }
        .photo-item input { position: absolute; opacity: 0; width: 100%; height: 100%; top:0; left:0; cursor: pointer; }
        
        .sig-container { background: #fff; border: 1px solid #d1d1d6; border-radius: 10px; margin-top: 8px; touch-action: none; }
        canvas { width: 100%; height: 140px; display: block; border-radius: 10px; }
        
        .btn-clear { background: none; border: none; color: #FF3B30; font-size: 11px; padding: 5px; cursor: pointer; width: 100%; text-align: right; }
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 700; margin-top: 20px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-logo">
        <img src="https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png" alt="Logo">
    </div>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('cs')">Čeština</button>
    </div>
    
    <a href="https://certcheck.worldathletics.org/" target="_blank" class="btn-link" id="btn-list">
        LIST OF APPROVED ATHLETIC SHOES
    </a>

    <label id="lbl-comp">Competition Name</label>
    <input type="text" id="compName">

    <div class="grid">
        <div><label id="lbl-date">Race Date</label><input type="date" id="raceDate"></div>
        <div><label id="lbl-sex">Sex Category</label><select id="sex"><option value="Men">Men</option><option value="Women">Women</option></select></div>
    </div>

    <label id="lbl-name">Athlete's Name</label><input type="text" id="athleteName">
    <label id="lbl-event">Event</label><input type="text" id="event">

    <div class="grid">
        <div><label id="lbl-brand">Shoe Brand</label><input type="text" id="brand"></div>
        <div><label id="lbl-model">Shoe Model</label><input type="text" id="model"></div>
    </div>

    <label id="lbl-photo">Photo Documentation</label>
    <div class="photo-grid">
        <div class="photo-item"><span id="p-side">📸 Side View</span><input type="file" id="p1" accept="image/*" capture="environment"></div>
        <div class="photo-item"><span id="p-outsole">📸 Outsole</span><input type="file" id="p2" accept="image/*" capture="environment"></div>
        <div class="photo-item"><span id="p-heel">📸 Heel</span><input type="file" id="p3" accept="image/*" capture="environment"></div>
        <div class="photo-item"><span id="p-label">📸 Label</span><input type="file" id="p4" accept="image/*" capture="environment"></div>
        <div class="photo-item"><span id="p-insole">📸 Insole</span><input type="file" id="p5" accept="image/*" capture="environment"></div>
    </div>

    <label id="lbl-notes">Technical Notes / Decision</label>
    <textarea id="notes" rows="2"></textarea>

    <label id="lbl-sig-a">Athlete's Signature</label>
    <div class="sig-container"><canvas id="sig-a"></canvas></div>
    <button class="btn-clear" type="button" id="clear-a">Clear Signature</button>

    <label id="lbl-sig-i">Inspector's Signature</label>
    <div class="sig-container"><canvas id="sig-i"></canvas></div>
    <button class="btn-clear" type="button" id="clear-i">Clear Signature</button>

    <button class="btn-submit" id="generate">GENERATE PDF PROTOCOL</button>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let currentLang = 'en';

    const translations = {
        en: {
            title: "SHOE CHECK PROTOCOL", btnList: "LIST OF APPROVED ATHLETIC SHOES",
            comp: "Competition Name", date: "Race Date", sex: "Sex Category",
            name: "Athlete's Name", event: "Event", brand: "Shoe Brand", model: "Shoe Model",
            photo: "Photo Documentation", side: "📸 Side View", outsole: "📸 Outsole",
            heel: "📸 Heel", label: "📸 Label", insole: "📸 Insole",
            notes: "Technical Notes / Decision", sigA: "Athlete's Signature",
            sigI: "Inspector's Signature", btnGen: "GENERATE PDF PROTOCOL",
            issued: "Issued Date", photoTitle: "PHOTO DOCUMENTATION",
            men: "Men", women: "Women", clear: "Clear Signature",
            checkSide: "Side View Captured", checkOut: "Outsole Captured",
            checkHeel: "Heel Captured", checkLabel: "Label Captured",
            checkInsole: "Insole Captured", fileName: "Protocol"
        },
        cs: {
            title: "PROTOKOL KONTROLY OBUVI", btnList: "SEZNAM SCHVÁLENÉ OBUVI",
            comp: "Název závodu", date: "Datum závodu", sex: "Kategorie",
            name: "Jméno atleta", event: "Disciplína", brand: "Značka obuvi", model: "Model obuvi",
            photo: "Fotodokumentace", side: "📸 Z boku", outsole: "📸 Podrážka",
            heel: "📸 Pata", label: "📸 Štítek", insole: "📸 Vložka",
            notes: "Technické poznámky / Rozhodnutí", sigA: "Podpis atleta",
            sigI: "Podpis inspektora", btnGen: "VYGENEROVAT PDF PROTOKOL",
            issued: "Datum vydání", photoTitle: "FOTODOKUMENTACE",
            men: "Muži", women: "Ženy", clear: "Smazat podpis",
            checkSide: "Fotka z boku pořízena", checkOut: "Fotka podrážky pořízena",
            checkHeel: "Fotka paty pořízena", checkLabel: "Fotka štítku pořízena",
            checkInsole: "Fotka vložky pořízena", fileName: "Protokol"
        }
    };

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(lang === 'cs' ? 'češ' : 'eng')));
        
        document.getElementById('btn-list').innerText = t.btnList;
        document.getElementById('lbl-comp').innerText = t.comp;
        document.getElementById('lbl-date').innerText = t.date;
        document.getElementById('lbl-sex').innerText = t.sex;
        document.getElementById('lbl-name').innerText = t.name;
        document.getElementById('lbl-event').innerText = t.event;
        document.getElementById('lbl-brand').innerText = t.brand;
        document.getElementById('lbl-model').innerText = t.model;
        document.getElementById('lbl-photo').innerText = t.photo;
        document.getElementById('p-side').innerText = t.side;
        document.getElementById('p-outsole').innerText = t.outsole;
        document.getElementById('p-heel').innerText = t.heel;
        document.getElementById('p-label').innerText = t.label;
        document.getElementById('p-insole').innerText = t.insole;
        document.getElementById('lbl-notes').innerText = t.notes;
        document.getElementById('lbl-sig-a').innerText = t.sigA;
        document.getElementById('lbl-sig-i').innerText = t.sigI;
        document.getElementById('clear-a').innerText = t.clear;
        document.getElementById('clear-i').innerText = t.clear;
        document.getElementById('generate').innerText = t.btnGen;
        
        const sexSel = document.getElementById('sex');
        sexSel.options[0].text = t.men; sexSel.options[1].text = t.women;
    }

    const setupPad = (id) => {
        const c = document.getElementById(id);
        const p = new SignaturePad(c, { backgroundColor: '#ffffff' });
        const res = () => {
            const r = Math.max(window.devicePixelRatio || 1, 1);
            c.width = c.offsetWidth * r; c.height = c.offsetHeight * r;
            c.getContext("2d").scale(r, r);
            p.clear();
        };
        window.addEventListener("resize", res); setTimeout(res, 500);
        return p;
    };

    const padA = setupPad('sig-a');
    const padI = setupPad('sig-i');
    document.getElementById('clear-a').onclick = () => padA.clear();
    document.getElementById('clear-i').onclick = () => padI.clear();

    const resizeImg = (file) => {
        return new Promise((res) => {
            if (!file) return res(null);
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 1200;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.75));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    };

    document.getElementById('generate').onclick = async () => {
        const btn = document.getElementById('generate');
        const t = translations[currentLang];
        btn.innerText = "..."; btn.disabled = true;

        try {
            const doc = new jsPDF();
            const logo = "https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png";
            const dateStr = new Date().toLocaleDateString(currentLang === 'cs' ? 'cs-CZ' : 'en-GB');

            const drawPageHeader = (titleText) => {
                doc.setFillColor(0, 122, 255); doc.rect(20, 15, 170, 2, 'F');
                try { doc.addImage(logo, 'PNG', 155, 18, 35, 20); } catch(e){}
                doc.setFont("helvetica", "bold"); doc.setFontSize(20);
                doc.text(titleText, 20, 33);
                doc.setFontSize(9); doc.setFont("", "normal");
                doc.text(`${t.issued}: ${dateStr}`, 20, 38);
            };

            // STRANA 1
            drawPageHeader(t.title);
            let y = 50; doc.setDrawColor(0); doc.setLineWidth(0.5); doc.line(20, y, 190, y);

            const addRow = (label, val) => {
                y += 8; doc.setFont("", "bold"); doc.text(label + ":", 25, y);
                doc.setFont("", "normal"); doc.text(String(val || "-"), 75, y);
                y += 4; doc.setDrawColor(200); doc.setLineWidth(0.1); doc.line(20, y, 190, y);
            };

            addRow(t.comp, document.getElementById('compName').value);
            addRow(t.date, document.getElementById('raceDate').value);
            addRow(t.name, document.getElementById('athleteName').value);
            addRow(t.event + " / " + t.sex, document.getElementById('event').value + " / " + document.getElementById('sex').value);
            addRow(t.brand, document.getElementById('brand').value);
            addRow(t.model, document.getElementById('model').value);

            y += 15; doc.setFillColor(245, 245, 245); doc.rect(20, y, 170, 25, 'F');
            doc.setFont("", "bold"); doc.text(t.notes.toUpperCase() + ":", 25, y + 8);
            doc.setFont("", "normal"); doc.text(document.getElementById('notes').value || "OK", 25, y + 16, { maxWidth: 160 });

            y += 35; doc.setFont("", "bold"); doc.setFontSize(10);
            const chk = (id) => document.getElementById(id).files[0] ? "[ X ]" : "[   ]";
            doc.text(`${chk('p1')} ${t.checkSide}`, 25, y); y+=6;
            doc.text(`${chk('p2')} ${t.checkOut}`, 25, y); y+=6;
            doc.text(`${chk('p3')} ${t.checkHeel}`, 25, y); y+=6;
            doc.text(`${chk('p4')} ${t.checkLabel}`, 25, y); y+=6;
            doc.text(`${chk('p5')} ${t.checkInsole}`, 25, y);

            y = 235; doc.setDrawColor(0); doc.setLineWidth(0.5);
            doc.rect(20, y, 80, 40); doc.setFontSize(8); doc.text(t.sigA.toUpperCase(), 60, y + 35, { align: "center" });
            if (!padA.isEmpty()) doc.addImage(padA.toDataURL(), 'PNG', 25, y + 5, 70, 25);
            doc.rect(110, y, 80, 40); doc.text(t.sigI.toUpperCase(), 150, y + 35, { align: "center" });
            if (!padI.isEmpty()) doc.addImage(padI.toDataURL(), 'PNG', 115, y + 5, 70, 25);

            // STRANA 2
            const photos = ['p1', 'p2', 'p3', 'p4', 'p5'];
            const labels = [t.side, t.outsole, t.heel, t.label, t.insole];
            let hasPh = false; for(let id of photos) if(document.getElementById(id).files[0]) hasPh = true;

            if (hasPh) {
                doc.addPage(); drawPageHeader(t.photoTitle);
                let py = 55, count = 0;
                for (let i = 0; i < photos.length; i++) {
                    const img = await resizeImg(document.getElementById(photos[i]).files[0]);
                    if (img) {
                        const x = (count % 2 === 0) ? 20 : 110;
                        doc.setFontSize(9); doc.text(labels[i].replace('📸 ', ''), x, py - 3);
                        doc.setDrawColor(230); doc.rect(x, py, 80, 60); doc.addImage(img, 'JPEG', x, py, 80, 60);
                        if (count % 2 === 1) py += 75;
                        count++;
                        if (count % 6 === 0 && count < 5) { doc.addPage(); drawPageHeader(t.photoTitle); py = 55; }
                    }
                }
            }

            doc.save(`${t.fileName}_${(document.getElementById('athleteName').value || "Draft").replace(/\s+/g, '_')}.pdf`);
        } catch (e) { alert("Error"); console.error(e); }
        btn.innerText = t.btnGen; btn.disabled = false;
    };
</script>
</body>
</html>
