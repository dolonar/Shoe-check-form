<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shoe check form</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-gray: #8e8e93;
            --border: #d1d1d6;
            --input-bg: #ffffff;
            --placeholder: #c7c7cc;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text-main: #f2f2f7;
            --text-gray: #aeaeb2;
            --border: #3a3a3c;
            --input-bg: #2c2c2e;
            --placeholder: #636366;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        .app-header {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 0;
            position: relative;
        }

        .app-header img {
            max-width: 160px;
            height: auto;
            border-radius: 10px;
        }

        .theme-toggle {
            position: absolute;
            right: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            max-width: 800px;
            margin: 0 auto 20px auto;
            width: 100%;
        }

        .lang-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .lang-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        .db-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(52, 199, 89, 0.4);
            color: var(--success);
            text-decoration: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 25px;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 1px solid var(--success);
        }

        [data-theme="dark"] .db-link {
            color: #81f09b;
            border-color: #81f09b;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; }
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: 700;
            font-size: 11px;
            color: var(--text-gray);
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-main);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 12px;
        }

        .photo-item {
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 15px 5px;
            text-align: center;
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        .photo-item.has-file {
            border-color: var(--success);
            background: rgba(52, 199, 89, 0.1);
        }

        .add-photo-btn {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 2px dashed var(--border);
            background: var(--input-bg);
            color: var(--text-gray);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            margin-top: 15px;
        }

        .other-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            justify-content: center;
        }

        .other-tag {
            background: var(--primary);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sig-trigger {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 12px;
            border: 1.5px dashed var(--primary);
            background: var(--input-bg);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        .sig-icon { width: 20px; height: 20px; fill: var(--primary); margin-right: 8px; }

        .sig-trigger.signed { border-style: solid; border-color: var(--success); color: var(--success); }

        .sig-trigger.signed .sig-icon { fill: var(--success); }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(0,122,255,0.2);
        }

        .btn-reset {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }

        .history-section {
            margin-top: 40px;
            border-top: 2px solid var(--border);
            padding-top: 20px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .history-title { font-size: 14px; color: var(--text-gray); font-weight: 800; text-transform: uppercase; }

        .btn-clear-hist { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 11px; font-weight: 700; }

        .history-item {
            background: var(--input-bg);
            padding: 12px 15px;
            border-radius: 14px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .app-footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 11px;
            color: var(--text-gray);
        }

        .app-footer a { color: var(--primary); text-decoration: none; font-weight: 700; }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            z-index: 9999;
            display: none;
            flex-direction: column;
        }

        .modal.active { display: flex; }

        .modal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .modal-body { flex: 1; background: #ffffff; position: relative; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .modal-footer { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body data-theme="light">

<div class="app-header">
    <img src="https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png" alt="Logo">
    <div class="theme-toggle" onclick="toggleTheme()" id="theme-icon">🌙</div>
</div>

<div class="card">
    <div class="lang-switch">
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
        <button class="lang-btn" id="btn-cs" onclick="setLang('cs')">Čeština</button>
    </div>

    <a href="https://certcheck.worldathletics.org/" target="_blank" class="db-link" id="btn-list">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
        <span id="txt-list">LIST OF APPROVED ATHLETIC SHOES</span>
    </a>

    <div class="grid">
        <div>
            <label id="lbl-comp">Competition</label>
            <input type="text" id="compName" list="compListOptions" autocomplete="off">
            <datalist id="compListOptions"></datalist>
        </div>
        <div>
            <label id="lbl-date">Date</label>
            <input type="date" id="raceDate">
        </div>
    </div>

    <div class="grid">
        <div>
            <label id="lbl-name">Athlete Name</label>
            <input type="text" id="athleteName" autocomplete="off">
        </div>
        <div>
            <label id="lbl-sex">Category</label>
            <select id="sex">
                <option value="Men" id="opt-men">Men</option>
                <option value="Women" id="opt-women">Women</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div>
            <label id="lbl-brand">Shoe Brand</label>
            <input type="text" id="brand" autocomplete="off">
        </div>
        <div>
            <label id="lbl-model">Shoe Model</label>
            <input type="text" id="model" autocomplete="off">
        </div>
    </div>

    <div class="grid">
        <div>
            <label id="lbl-insp-name">Inspector Name</label>
            <input type="text" id="inspName" list="inspListOptions" oninput="autoFillId(this.value)" autocomplete="off">
            <datalist id="inspListOptions"></datalist>
        </div>
        <div>
            <label id="lbl-insp-id">ID Number</label>
            <input type="text" id="inspId" list="idListOptions" autocomplete="off">
            <datalist id="idListOptions"></datalist>
        </div>
    </div>

    <label id="lbl-photo">Photo Documentation</label>
    <div class="photo-grid">
        <div class="photo-item" id="item-p1">
            <span>📸</span><span id="p-side1">BIB & Shoe</span>
            <input type="file" id="p1" accept="image/*" capture="environment" onchange="markFilled('p1')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
        </div>
        <div class="photo-item" id="item-p2">
            <span>📸</span><span id="p-side2">Side View</span>
            <input type="file" id="p2" accept="image/*" capture="environment" onchange="markFilled('p2')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
        </div>
        <div class="photo-item" id="item-p3">
            <span>📸</span><span id="p-side3">Outsole</span>
            <input type="file" id="p3" accept="image/*" capture="environment" onchange="markFilled('p3')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
        </div>
        <div class="photo-item" id="item-p4">
            <span>📸</span><span id="p-side4">Label</span>
            <input type="file" id="p4" accept="image/*" capture="environment" onchange="markFilled('p4')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
        </div>
        <div class="photo-item" id="item-p5">
            <span>📸</span><span id="p-side5">Insole Side</span>
            <input type="file" id="p5" accept="image/*" capture="environment" onchange="markFilled('p5')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
        </div>
        <div class="photo-item" id="item-p6">
            <span>📸</span><span id="p-side6">Insole Top</span>
            <input type="file" id="p6" accept="image/*" capture="environment" onchange="markFilled('p6')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
        </div>
    </div>

    <div class="add-photo-btn">
        <span id="txt-add-other">+ Add Photo</span>
        <input type="file" accept="image/*" capture="environment" onchange="handleOtherPhoto(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
    </div>
    <div id="otherFileList" class="other-list"></div>

    <label id="lbl-sig-title">Authentication</label>
    <button class="sig-trigger" id="btn-sig-a" onclick="openSig('a')">
        <span style="display:flex; align-items:center;">
            <svg class="sig-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            <span id="txt-sig-a">Athlete's Signature</span>
        </span>
        <span id="stat-a">❌</span>
    </button>
    
    <button class="sig-trigger" id="btn-sig-i" onclick="openSig('i')">
        <span style="display:flex; align-items:center;">
            <svg class="sig-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            <span id="txt-sig-i">Inspector's Signature</span>
        </span>
        <span id="stat-i">❌</span>
    </button>

    <button class="btn-submit" id="btn-gen">CREATE REPORT</button>
    <div style="text-align:center;">
        <button class="btn-reset" onclick="confirmFullReset()" id="btn-reset">RESET FORM</button>
    </div>

    <div class="history-section">
        <div class="history-header">
            <div class="history-title" id="lbl-hist">HISTORY</div>
            <button class="btn-clear-hist" onclick="clearHistory()" id="btn-clear-txt">CLEAR</button>
        </div>
        <div id="history-list"></div>
    </div>
</div>

<div class="app-footer">
    Developed & Designed by <a href="https://www.instagram.com/doolonar/" target="_blank">David Lux</a> &copy; 2026
</div>

<div id="sigModal" class="modal">
    <div class="modal-header">
        <h3 id="m-title-label">Signature</h3>
        <button onclick="closeSig()" style="border:none; background:none; font-size:28px; color:var(--text-main);">✕</button>
    </div>
    <div class="modal-body">
        <canvas id="sigCanvas"></canvas>
    </div>
    <div class="modal-footer">
        <button id="btn-sig-clear" onclick="activePad.clear()" style="padding:15px; border-radius:12px; border:1px solid var(--danger); color:var(--danger); background:none; font-weight:700;">Clear</button>
        <button id="btn-sig-save" onclick="saveSig()" style="padding:15px; border-radius:12px; border:none; background:var(--success); color:white; font-weight:700;">Save</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let currentLang = 'en', sigData = { a: null, i: null }, otherPhotos = [], activePad, activeType;

    const translations = {
        en: { 
            title: "SHOE CONTROL REPORT", btnList: "LIST OF APPROVED ATHLETIC SHOES", 
            comp: "Competition", date: "Date", athlete: "Athlete Name", sex: "Category", men: "Men", women: "Women", 
            brand: "Shoe Brand", model: "Shoe Model", photo: "Photo Documentation", addOther: "+ Add Photo", 
            inspName: "Inspector Name", inspId: "ID Number",
            sigA: "Athlete Signature", sigI: "Inspector Signature", gen: "CREATE REPORT", reset: "RESET FORM", 
            hist: "HISTORY", clear: "CLEAR", clearConfirm: "Delete history?", warnMsg: "vášně chceš odeslat nedokončený formulář",
            sigModalTitle: "Signature", sigClear: "Clear", sigSave: "Save",
            phComp: "Event Name", phAthlete: "Full Name", phBrand: "Nike", phModel: "Vaporfly 3", 
            p1: "BIB & Shoe", p2: "Side View", p3: "Outsole", p4: "Label", p5: "Insole Side", p6: "Insole Top" 
        },
        cs: { 
            title: "PROTOKOL KONTROLY OBUVI", btnList: "SEZNAM SCHVÁLENÉ OBUVI", 
            comp: "Závod", date: "Datum", athlete: "Jméno atleta", sex: "Kategorie", men: "Muži", women: "Ženy", 
            brand: "Značka obuvi", model: "Model obuvi", photo: "Fotodokumentace", addOther: "+ Přidat fotku", 
            inspName: "Jméno rozhodčího", inspId: "Průkaz (číslo)",
            sigA: "Podpis atleta", sigI: "Podpis rozhodčího", gen: "VYTVOŘIT PROTOKOL", reset: "VYMAZAT FORMULÁŘ", 
            hist: "HISTORIE", clear: "SMAZAT", clearConfirm: "Smazat celou historii?", warnMsg: "vášně chceš odeslat nedokončený formulář",
            sigModalTitle: "Podpis", sigClear: "Smazat", sigSave: "Uložit",
            phComp: "Zlatá tretra", phAthlete: "Jméno a příjmení", phBrand: "např. Nike", phModel: "např. Vaporfly 3", 
            p1: "Startovní číslo a bota", p2: "Pohled z boku", p3: "Podrážka", p4: "Štítek", p5: "Vložka (bok)", p6: "Vložka (shora)" 
        }
    };

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        body.setAttribute('data-theme', newTheme);
        document.getElementById('theme-icon').innerText = newTheme === 'light' ? '🌙' : '☀️';
        localStorage.setItem('theme', newTheme);
    }
    if (localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        document.getElementById('theme-icon').innerText = '☀️';
    }

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('btn-cs').classList.toggle('active', lang === 'cs');
        
        document.getElementById('txt-list').innerText = t.btnList;
        document.getElementById('lbl-comp').innerText = t.comp; 
        document.getElementById('lbl-date').innerText = t.date;
        document.getElementById('lbl-name').innerText = t.athlete; 
        document.getElementById('lbl-sex').innerText = t.sex;
        document.getElementById('opt-men').innerText = t.men;
        document.getElementById('opt-women').innerText = t.women;
        document.getElementById('lbl-brand').innerText = t.brand; 
        document.getElementById('lbl-model').innerText = t.model;
        document.getElementById('lbl-insp-name').innerText = t.inspName; 
        document.getElementById('lbl-insp-id').innerText = t.inspId;
        document.getElementById('lbl-photo').innerText = t.photo; 
        document.getElementById('txt-add-other').innerText = t.addOther;
        document.getElementById('txt-sig-a').innerText = t.sigA; 
        document.getElementById('txt-sig-i').innerText = t.sigI;
        document.getElementById('btn-gen').innerText = t.gen; 
        document.getElementById('btn-reset').innerText = t.reset;
        document.getElementById('lbl-hist').innerText = t.hist;
        document.getElementById('btn-clear-txt').innerText = t.clear;
        
        document.getElementById('m-title-label').innerText = t.sigModalTitle;
        document.getElementById('btn-sig-clear').innerText = t.sigClear;
        document.getElementById('btn-sig-save').innerText = t.sigSave;

        document.getElementById('compName').placeholder = t.phComp; 
        document.getElementById('athleteName').placeholder = t.phAthlete;
        document.getElementById('brand').placeholder = t.phBrand; 
        document.getElementById('model').placeholder = t.phModel;
        
        document.getElementById('p-side1').innerText = t.p1;
        document.getElementById('p-side2').innerText = t.p2;
        document.getElementById('p-side3').innerText = t.p3;
        document.getElementById('p-side4').innerText = t.p4;
        document.getElementById('p-side5').innerText = t.p5;
        document.getElementById('p-side6').innerText = t.p6;
        
        updateDatalists();
        renderHistory();
    }

    function updateDatalists() {
        const comps = JSON.parse(localStorage.getItem('compList') || '[]');
        const insps = JSON.parse(localStorage.getItem('inspList') || '[]');
        document.getElementById('compListOptions').innerHTML = comps.map(c => `<option value="${c}">`).join('');
        document.getElementById('inspListOptions').innerHTML = insps.map(i => `<option value="${i.name}">`).join('');
        document.getElementById('idListOptions').innerHTML = insps.map(i => `<option value="${i.id}">`).join('');
    }

    function autoFillId(name) {
        const insps = JSON.parse(localStorage.getItem('inspList') || '[]');
        const found = insps.find(i => i.name.trim() === name.trim());
        if (found) document.getElementById('inspId').value = found.id;
    }

    function saveToMemory(comp, inspName, inspId) {
        let comps = JSON.parse(localStorage.getItem('compList') || '[]');
        let insps = JSON.parse(localStorage.getItem('inspList') || '[]');
        if (comp && !comps.includes(comp.trim())) comps.push(comp.trim());
        if (inspName && !insps.some(i => i.name.trim() === inspName.trim())) {
            insps.push({name: inspName.trim(), id: inspId.trim()});
        }
        localStorage.setItem('compList', JSON.stringify(comps.slice(-20)));
        localStorage.setItem('inspList', JSON.stringify(insps.slice(-20)));
    }

    function partialReset() {
        document.getElementById('athleteName').value = "";
        document.getElementById('brand').value = "";
        document.getElementById('model').value = "";
        sigData = { a: null, i: null };
        document.getElementById('stat-a').innerText = '❌';
        document.getElementById('stat-i').innerText = '❌';
        document.getElementById('btn-sig-a').classList.remove('signed');
        document.getElementById('btn-sig-i').classList.remove('signed');
        for(let i=1; i<=6; i++) {
            document.getElementById('p'+i).value = "";
            document.getElementById('item-p'+i).classList.remove('has-file');
        }
        otherPhotos = [];
        document.getElementById('otherFileList').innerHTML = "";
    }

    function confirmFullReset() { if (confirm("Reset ALL fields?")) location.reload(); }

    function handleOtherPhoto(input) {
        if (input.files && input.files[0]) {
            otherPhotos.push(input.files[0]);
            renderOtherList();
            input.value = "";
        }
    }

    function renderOtherList() {
        const container = document.getElementById('otherFileList');
        container.innerHTML = otherPhotos.map((f, i) => `
            <div class="other-tag">Photo ${i + 1} <span onclick="otherPhotos.splice(${i}, 1); renderOtherList();" style="cursor:pointer; font-weight:bold; margin-left:5px;">✕</span></div>
        `).join('');
    }

    function markFilled(id) {
        const item = document.getElementById('item-' + id);
        item.classList.toggle('has-file', document.getElementById(id).files.length > 0);
    }

    const canvas = document.getElementById('sigCanvas');
    activePad = new SignaturePad(canvas, { backgroundColor: 'white' });

    function openSig(type) {
        activeType = type;
        const t = translations[currentLang];
        document.getElementById('sigModal').classList.add('active');
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        activePad.clear();
        if (sigData[type]) activePad.fromDataURL(sigData[type]);
    }

    function saveSig() {
        if (!activePad.isEmpty()) {
            sigData[activeType] = activePad.toDataURL();
            document.getElementById('stat-' + activeType).innerText = '✅';
            document.getElementById('btn-sig-' + activeType).classList.add('signed');
        }
        closeSig();
    }

    function closeSig() { document.getElementById('sigModal').classList.remove('active'); }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const hist = JSON.parse(localStorage.getItem('shoeHistory') || '[]');
        list.innerHTML = hist.map(h => `
            <div class="history-item">
                <div><b>${h.name}</b><br><small>${h.comp}</small></div>
                <div style="font-size:11px; color:var(--text-gray);">${h.time}</div>
            </div>
        `).join('');
    }

    function clearHistory() {
        if (confirm(translations[currentLang].clearConfirm)) {
            localStorage.removeItem('shoeHistory'); localStorage.removeItem('compList'); localStorage.removeItem('inspList');
            updateDatalists(); renderHistory();
        }
    }

    const clean = (str) => str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
    async function processImg(file) {
        if (!file) return null;
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const ctx = c.getContext('2d');
                    c.width = img.width; c.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    resolve({ data: c.toDataURL('image/jpeg', 0.8), w: img.width, h: img.height });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('btn-gen').onclick = async () => {
        const athleteVal = document.getElementById('athleteName').value;
        const compVal = document.getElementById('compName').value;
        const brandVal = document.getElementById('brand').value;
        const dateVal = document.getElementById('raceDate').value;
        const inspName = document.getElementById('inspName').value;
        const inspId = document.getElementById('inspId').value;

        if (!compVal || !athleteVal || !brandVal) {
            if (!confirm(translations[currentLang].warnMsg)) return;
        }

        saveToMemory(compVal, inspName, inspId);
        
        const doc = new jsPDF();
        const now = new Date().toLocaleString('en-GB');
        const logo = "https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png";
        const t = translations.en;

        const validPhotos = [];
        for (let i = 1; i <= 6; i++) {
            const f = document.getElementById('p'+i).files[0];
            if (f) validPhotos.push({ ...await processImg(f), label: t['p'+i] });
        }
        for (let i = 0; i < otherPhotos.length; i++) {
            validPhotos.push({ ...await processImg(otherPhotos[i]), label: "Other Photo " + (i + 1) });
        }

        doc.addImage(logo, 'PNG', 150, 10, 40, 20);
        doc.setFontSize(22).setFont("helvetica", "bold").text(t.title, 20, 25);
        doc.setDrawColor(0, 122, 255).setLineWidth(1).line(20, 35, 190, 35);
        
        doc.setFontSize(10).setTextColor(120).text("COMPETITION", 20, 50);
        doc.setFontSize(14).setTextColor(0).setFont("helvetica", "normal").text(clean(compVal) || "---", 20, 58);
        
        doc.setFontSize(10).setTextColor(120).text("ATHLETE", 20, 75);
        doc.setFontSize(14).text(`${clean(athleteVal)} (${document.getElementById('sex').value})`, 20, 83);
        
        doc.setFontSize(10).setTextColor(120).text("SHOE DETAILS", 20, 100);
        doc.setFontSize(14).text(`${clean(brandVal)} - ${clean(document.getElementById('model').value)}`, 20, 108);

        doc.setFontSize(10).setTextColor(120).text("DOCUMENTS ATTACHED", 20, 125);
        doc.setFontSize(9).setTextColor(0);
        for(let i=1; i<=6; i++) {
            const has = document.getElementById('p'+i).files.length > 0;
            doc.text(`${has ? "[X]" : "[  ]"}  ${t['p'+i]}`, 25, 135 + ((i-1) * 7));
        }
        if (otherPhotos.length > 0) doc.text(`[X]  Other photos attached: ${otherPhotos.length}`, 25, 135 + (6 * 7));

        const sigY = 240;
        doc.setDrawColor(180).line(20, sigY, 85, sigY);
        doc.line(125, sigY, 190, sigY);
        doc.setFontSize(9);
        doc.text(clean(athleteVal) || "---", 52, sigY + 5, {align:'center'});
        doc.text(t.sigA, 52, sigY + 9, {align:'center'});
        doc.text(`${clean(inspName)} (${clean(inspId)})`, 157, sigY + 5, {align:'center'});
        doc.text(t.sigI, 157, sigY + 9, {align:'center'});
        
        if (sigData.a) doc.addImage(sigData.a, 'PNG', 27, sigY - 25, 45, 20);
        if (sigData.i) doc.addImage(sigData.i, 'PNG', 135, sigY - 25, 45, 20);
        doc.setFontSize(8).setTextColor(150).text(`Generated: ${now}`, 190, 285, {align: 'right'});

        if (validPhotos.length > 0) {
            doc.addPage();
            doc.setFontSize(18).setFont("helvetica", "bold").setTextColor(0).text("PHOTO DOCUMENTATION", 20, 25);
            validPhotos.forEach((item, i) => {
                const col = i % 2, row = Math.floor(i / 2), maxWidth = 80, maxHeight = 45;
                let finalW = maxWidth, finalH = (item.h * maxWidth) / item.w;
                if (finalH > maxHeight) { finalH = maxHeight; finalW = (item.w * maxHeight) / item.h; }
                const x = 20 + (col * 90) + (maxWidth - finalW) / 2;
                const y = 40 + (row * 55) + (maxHeight - finalH) / 2;
                doc.addImage(item.data, 'JPEG', x, y, finalW, finalH);
                doc.setFontSize(8).setTextColor(120).text(item.label, 20 + (col * 90), 40 + (row * 55) + 48);
            });
        }

        const fileName = `${clean(athleteVal).replace(/\s+/g, '_')}_${clean(compVal).replace(/\s+/g, '_')}_${dateVal || "NoDate"}.pdf`;
        doc.save(fileName);

        let hist = JSON.parse(localStorage.getItem('shoeHistory') || '[]');
        hist.unshift({ name: athleteVal || "N/A", comp: compVal || "N/A", time: now });
        localStorage.setItem('shoeHistory', JSON.stringify(hist.slice(0, 20)));

        partialReset();
        updateDatalists();
        renderHistory();
        window.scrollTo(0, 0);
    };

    window.onload = () => setLang('cs');
</script>
</body>
</html>
