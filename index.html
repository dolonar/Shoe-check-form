<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shoe check form</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #000000;
            --accent: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-gray: #8e8e93;
            --border: #e5e5ea;
            --input-bg: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Bebas Neue', cursive;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text-main: #f2f2f7;
            --text-gray: #aeaeb2;
            --border: #3a3a3c;
            --input-bg: #2c2c2e;
            --primary: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            margin: 0;
            padding: 10px;
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        .app-header { display: flex; justify-content: center; align-items: center; width: 100%; padding: 25px 0; position: relative; }
        .app-header img { max-width: 170px; height: auto; }

        .header-actions { position: absolute; right: 10px; }
        .icon-btn {
            background: var(--card-bg); border: 1px solid var(--border); padding: 10px;
            border-radius: 14px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
        }

        .card {
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto 20px auto; width: 100%;
        }

        .lang-switch { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .lang-btn {
            padding: 10px 20px; border-radius: 12px; border: 2px solid var(--border);
            background: transparent; color: var(--text-main); font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
        }
        .lang-btn.active { background: var(--primary); color: var(--card-bg); border-color: var(--primary); }

        .db-link {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: rgba(52, 199, 89, 0.1); color: #1a7a33; text-decoration: none;
            padding: 18px; border-radius: 16px; font-weight: 800; font-family: var(--font-heading);
            font-size: 18px; margin-bottom: 25px; width: 100%; text-transform: uppercase; border: 1.5px solid rgba(52, 199, 89, 0.2);
        }

        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }

        label { display: block; margin-top: 15px; font-weight: 800; font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { 
            width: 100%; padding: 16px; margin-top: 5px; border: 1px solid var(--border); 
            border-radius: 14px; font-size: 16px; background: var(--input-bg); color: var(--text-main); 
            outline: none; font-family: var(--font-main);
            -webkit-appearance: none;
        }

        /* FOTO TLAČÍTKA */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .photo-item {
            background: var(--input-bg); border: 2px solid var(--border); border-radius: 18px; padding: 25px 10px;
            text-align: center; position: relative; min-height: 130px; display: flex;
            flex-direction: column; align-items: center; justify-content: center; 
            font-size: 15px; font-weight: 800; text-transform: uppercase;
        }
        .photo-item span:first-child { font-size: 32px; margin-bottom: 8px; }
        .photo-item.has-file { border-color: var(--success); background: rgba(52, 199, 89, 0.05); }

        .add-photo-btn {
            width: 100%; padding: 22px; border-radius: 18px; border: 2px dashed var(--border);
            background: var(--input-bg); color: var(--text-gray); font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 15px;
            font-size: 15px; text-transform: uppercase;
        }

        .sig-trigger {
            width: 100%; padding: 18px; margin-top: 12px; border-radius: 14px; 
            border: 2.5px dashed var(--accent); background: var(--input-bg); 
            color: var(--accent); font-weight: 800; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 15px; text-transform: uppercase;
        }
        .sig-trigger.signed { border-style: solid; border-color: var(--success); color: var(--success); }

        .btn-submit { 
            background: var(--primary); color: var(--card-bg); border: none; width: 100%; padding: 22px; 
            border-radius: 20px; font-size: 24px; font-weight: 800; cursor: pointer; margin-top: 40px; 
            font-family: var(--font-heading); letter-spacing: 1.5px; text-transform: uppercase;
        }

        .btn-reset { 
            background: transparent; color: var(--danger); border: 2px solid var(--danger); width: 100%; 
            padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; 
            margin-top: 15px; text-transform: uppercase;
        }

        .history-section { margin-top: 40px; border-top: 2px solid var(--border); padding-top: 20px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-title { font-family: var(--font-heading); font-size: 24px; text-transform: uppercase; }

        /* MODALS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .modal-body { flex: 1; background: #ffffff; position: relative; min-height: 300px; }
        canvas { width: 100%; height: 100%; touch-action: none; background: #fff; cursor: crosshair; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-header h3 { font-family: var(--font-heading); font-size: 26px; margin: 0; text-transform: uppercase; }

        .other-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .other-tag { background: var(--accent); color: white; padding: 10px 14px; border-radius: 12px; font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div id="app-content">
    <div class="app-header">
        <img src="https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png" alt="Logo">
        <div class="header-actions">
            <div class="icon-btn" onclick="toggleTheme()" id="theme-icon">🌙</div>
        </div>
    </div>

    <div class="card">
        <div class="lang-switch">
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
            <button class="lang-btn" id="btn-cs" onclick="setLang('cs')">Čeština</button>
        </div>

        <a href="https://certcheck.worldathletics.org/" target="_blank" class="db-link" id="btn-list">
            <svg width="22" height="22" viewBox="0 0 24 24"><path fill="currentColor" d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
            <span id="txt-list">LIST OF APPROVED ATHLETIC SHOES</span>
        </a>

        <div class="grid">
            <div>
                <label id="lbl-comp">Competition</label>
                <input type="text" id="compName" list="compListOptions" autocomplete="off" placeholder="Závod...">
                <datalist id="compListOptions"></datalist>
            </div>
            <div><label id="lbl-date">Date</label><input type="date" id="raceDate"></div>
        </div>

        <div class="grid">
            <div><label id="lbl-name">Athlete Name</label><input type="text" id="athleteName" autocomplete="off" placeholder="Jméno atleta..."></div>
            <div>
                <label id="lbl-sex">Category</label>
                <select id="sex">
                    <option value="Men" id="opt-men">Men</option>
                    <option value="Women" id="opt-women">Women</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label id="lbl-brand">Shoe Brand</label>
                <input type="text" id="brand" list="brandListOptions" autocomplete="off" oninput="updateModelSuggestions(this.value)" placeholder="Značka...">
                <datalist id="brandListOptions"></datalist>
            </div>
            <div>
                <label id="lbl-model">Shoe Model</label>
                <input type="text" id="model" list="modelListOptions" autocomplete="off" placeholder="Model...">
                <datalist id="modelListOptions"></datalist>
            </div>
        </div>

        <div class="grid">
            <div>
                <label id="lbl-insp-name">Inspector Name</label>
                <input type="text" id="inspName" list="inspHistoryOptions" oninput="autoFillId(this.value)" autocomplete="off" placeholder="Jméno rozhodčího...">
                <datalist id="inspHistoryOptions"></datalist>
            </div>
            <div>
                <label id="lbl-insp-id">ID Number</label>
                <input type="text" id="inspId" list="idListOptions" autocomplete="off" placeholder="Číslo průkazu...">
                <datalist id="idListOptions"></datalist>
            </div>
        </div>

        <div class="photo-grid">
            <div class="photo-item" id="item-p1"><span>📸</span><span id="p-side1">BIB & Shoe</span><input type="file" id="p1" accept="image/*" capture="environment" onchange="markFilled('p1')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p2"><span>📸</span><span id="p-side2">Side View</span><input type="file" id="p2" accept="image/*" capture="environment" onchange="markFilled('p2')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p3"><span>📸</span><span id="p-side3">Outsole</span><input type="file" id="p3" accept="image/*" capture="environment" onchange="markFilled('p3')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p4"><span>📸</span><span id="p-side4">Label</span><input type="file" id="p4" accept="image/*" capture="environment" onchange="markFilled('p4')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p5"><span>📸</span><span id="p-side5">Insole Side</span><input type="file" id="p5" accept="image/*" capture="environment" onchange="markFilled('p5')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p6"><span>📸</span><span id="p-side6">Insole Top</span><input type="file" id="p6" accept="image/*" capture="environment" onchange="markFilled('p6')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
        </div>

        <div class="add-photo-btn">
            <span id="txt-add-other">+ Add Photo</span>
            <input type="file" accept="image/*" capture="environment" onchange="handleOtherPhoto(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
        </div>
        <div id="otherFileList" class="other-list"></div>

        <button class="sig-trigger" id="btn-sig-a" onclick="openSig('a')">
            <span id="txt-sig-a">Athlete Signature</span><span id="stat-a">❌</span>
        </button>
        <button class="sig-trigger" id="btn-sig-i" onclick="openSig('i')">
            <span id="txt-sig-i">Inspector Signature</span><span id="stat-i">❌</span>
        </button>

        <button class="btn-submit" id="btn-gen">CREATE REPORT</button>
        <div style="text-align:center;"><button class="btn-reset" onclick="confirmFullReset()" id="btn-reset">RESET FORM</button></div>

        <div class="history-section">
            <div class="history-header"><div class="history-title" id="lbl-hist">HISTORY</div><button onclick="clearHistory()" id="btn-clear-txt" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:12px; font-weight:800; text-transform:uppercase;">CLEAR</button></div>
            <div id="history-list"></div>
        </div>
    </div>
    <div class="app-footer">Designed by <a href="https://www.instagram.com/doolonar/" target="_blank">David Lux</a> &copy; 2026</div>
</div>

<div id="sigModal" class="modal">
    <div class="modal-header"><h3 id="m-title-label">Signature</h3><button onclick="closeSig()" style="border:none; background:none; font-size:36px; color:var(--text-main);">✕</button></div>
    <div class="modal-body"><canvas id="sigCanvas"></canvas></div>
    <div style="padding:20px; display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <button onclick="activePad.clear()" style="padding:18px; border-radius:14px; border:2px solid var(--danger); color:var(--danger); background:none; font-weight:800; text-transform:uppercase;">Clear</button>
        <button onclick="saveSig()" style="padding:18px; border-radius:14px; border:none; background:var(--success); color:white; font-weight:800; text-transform:uppercase;">Save</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let currentLang = 'cs', sigData = { a: null, i: null }, otherPhotos = [], activePad, activeType;

    const shoeDatabase = {
        "Adidas": ["Adizero Adios Pro 3", "Adizero Avanti TYO", "Adizero Prime SP2", "Adizero Ambition"],
        "Nike": ["Air Zoom Victory", "Air Zoom Maxfly 2", "ZoomX Dragonfly 2", "Alphafly 3", "Vaporfly 3"],
        "Asics": ["Metaspeed Sky Paris", "Metaspeed Edge Paris", "Cosmoracer LD 2"],
        "Puma": ["Berserker Nitro Elite 2", "evoSPEED Sprint", "evoSPEED Tokyo Future"],
        "New Balance": ["FuelCell MD-X v2", "FuelCell SuperComp Elite v4"],
        "Hoka": ["Cielo X1", "Rocket X2"]
    };

    const translations = {
        en: { title: "SHOE CONTROL REPORT", btnList: "LIST OF APPROVED ATHLETIC SHOES", comp: "Competition", athlete: "Athlete Name", sigA: "Athlete Signature", sigI: "Inspector Signature", gen: "CREATE REPORT", reset: "RESET FORM", hist: "HISTORY", sigModalTitle: "Signature", warnMsg: "Send incomplete form?", p1: "BIB & Shoe", p2: "Side View", p3: "Outsole", p4: "Label", p5: "Insole Side", p6: "Insole Top" },
        cs: { title: "PROTOKOL KONTROLY OBUVI", btnList: "SEZNAM SCHVÁLENÉ OBUVI", comp: "Závod", athlete: "Jméno atleta", sigA: "Podpis atleta", sigI: "Podpis rozhodčího", gen: "VYTVOŘIT PROTOKOL", reset: "VYMAZAT FORMULÁŘ", hist: "HISTORIE", sigModalTitle: "Podpis", warnMsg: "vášně chceš odeslat nedokončený formulář", p1: "Startovní číslo a bota", p2: "Pohled z boku", p3: "Podrážka", p4: "Štítek", p5: "Vložka (bok)", p6: "Vložka (shora)" }
    };

    // --- INITIALIZATION ---
    window.onload = () => {
        setLang('cs');
        const canvas = document.getElementById('sigCanvas');
        activePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
    };

    function toggleTheme() {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
    }

    function setLang(lang) {
        currentLang = lang; const t = translations[lang];
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('btn-cs').classList.toggle('active', lang === 'cs');
        document.getElementById('txt-list').innerText = t.btnList;
        document.getElementById('lbl-comp').innerText = t.comp;
        document.getElementById('lbl-name').innerText = t.athlete;
        document.getElementById('txt-sig-a').innerText = t.sigA;
        document.getElementById('txt-sig-i').innerText = t.sigI;
        document.getElementById('btn-gen').innerText = t.gen;
        document.getElementById('btn-reset').innerText = t.reset;
        document.getElementById('lbl-hist').innerText = t.hist;
        document.getElementById('m-title-label').innerText = t.sigModalTitle;
        for(let i=1; i<=6; i++) document.getElementById('p-side'+i).innerText = t['p'+i];
        updateDatalists(); renderHistory();
    }

    // --- DATALISTS & SUGGESTIONS ---
    function updateDatalists() {
        const comps = JSON.parse(localStorage.getItem('compList') || '[]');
        const insps = JSON.parse(localStorage.getItem('inspList') || '[]');
        document.getElementById('compListOptions').innerHTML = comps.map(c => `<option value="${c}">`).join('');
        document.getElementById('inspHistoryOptions').innerHTML = insps.map(i => `<option value="${i.name}">`).join('');
        document.getElementById('idListOptions').innerHTML = insps.map(i => `<option value="${i.id}">`).join('');
        const brands = Object.keys(shoeDatabase).sort();
        document.getElementById('brandListOptions').innerHTML = brands.map(b => `<option value="${b}">`).join('');
    }

    function updateModelSuggestions(selectedBrand) {
        const modelInput = document.getElementById('model');
        const modelList = document.getElementById('modelListOptions');
        modelList.innerHTML = "";
        const brandKey = Object.keys(shoeDatabase).find(k => k.toLowerCase() === selectedBrand.toLowerCase().trim());
        if (brandKey) {
            const models = shoeDatabase[brandKey].sort();
            modelList.innerHTML = models.map(m => `<option value="${m}">`).join('');
            const randomModel = models[Math.floor(Math.random() * models.length)];
            modelInput.placeholder = (currentLang === 'cs' ? "Např. " : "E.g. ") + randomModel;
        }
    }

    function autoFillId(name) {
        const insps = JSON.parse(localStorage.getItem('inspList') || '[]');
        const found = insps.find(i => i.name.trim() === name.trim());
        if (found) document.getElementById('inspId').value = found.id;
    }

    // --- SIGNATURES ---
    function openSig(type) {
        activeType = type;
        const modal = document.getElementById('sigModal');
        modal.classList.add('active');
        
        const canvas = document.getElementById('sigCanvas');
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        
        activePad.clear();
        if (sigData[type]) activePad.fromDataURL(sigData[type]);
    }

    function saveSig() {
        if (!activePad.isEmpty()) {
            sigData[activeType] = activePad.toDataURL();
            document.getElementById('stat-' + activeType).innerText = '✅';
            document.getElementById('btn-sig-' + activeType).classList.add('signed');
        }
        closeSig();
    }

    function closeSig() { document.getElementById('sigModal').classList.remove('active'); }

    // --- LOGIC ---
    function markFilled(id) { document.getElementById('item-' + id).classList.toggle('has-file', document.getElementById(id).files.length > 0); }
    function handleOtherPhoto(input) { if (input.files[0]) { otherPhotos.push(input.files[0]); renderOtherList(); } }
    function renderOtherList() { document.getElementById('otherFileList').innerHTML = otherPhotos.map((f, i) => `<div class="other-tag">Foto ${i + 1}</div>`).join(''); }
    function confirmFullReset() { if(confirm("Smazat vše?")) { localStorage.clear(); location.reload(); } }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const hist = JSON.parse(localStorage.getItem('shoeHistory') || '[]');
        list.innerHTML = hist.map(h => `<div class="history-item"><b>${h.name}</b><small>${h.comp}</small></div>`).join('');
    }

    function clearHistory() { if (confirm("Smazat historii?")) { localStorage.removeItem('shoeHistory'); renderHistory(); } }

    const clean = (str) => str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
    async function processImg(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const ctx = c.getContext('2d');
                    c.width = img.width; c.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    resolve({ data: c.toDataURL('image/jpeg', 0.7), w: img.width, h: img.height });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // --- PDF ENGINE ---
    document.getElementById('btn-gen').onclick = async () => {
        const ath = document.getElementById('athleteName').value, cmp = document.getElementById('compName').value, brd = document.getElementById('brand').value, dt = document.getElementById('raceDate').value, inspN = document.getElementById('inspName').value, inspI = document.getElementById('inspId').value;
        if (!cmp || !ath || !brd) { if (!confirm(translations[currentLang].warnMsg)) return; }
        
        let comps = JSON.parse(localStorage.getItem('compList') || '[]');
        let insps = JSON.parse(localStorage.getItem('inspList') || '[]');
        if (cmp && !comps.includes(cmp.trim())) comps.push(cmp.trim());
        if (inspN && !insps.some(i => i.name.trim() === inspN.trim())) insps.push({name: inspN.trim(), id: inspI.trim()});
        localStorage.setItem('compList', JSON.stringify(comps.slice(-20)));
        localStorage.setItem('inspList', JSON.stringify(insps.slice(-20)));

        const doc = new jsPDF(), now = new Date().toLocaleString('en-GB'), logo = "https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png", t = translations.en;
        
        const validPhotos = [];
        for (let i = 1; i <= 6; i++) { 
            const f = document.getElementById('p'+i).files[0]; 
            if (f) validPhotos.push({ ...await processImg(f), label: t['p'+i] }); 
        }
        for (let i = 0; i < otherPhotos.length; i++) {
            validPhotos.push({ ...await processImg(otherPhotos[i]), label: "Extra Photo " + (i + 1) });
        }

        doc.addImage(logo, 'PNG', 150, 10, 40, 20);
        doc.setFontSize(22).setFont("helvetica", "bold").text(t.title, 20, 25);
        doc.setDrawColor(0).setLineWidth(0.5).line(20, 35, 190, 35);
        
        doc.setFontSize(10).setTextColor(100).text("COMPETITION", 20, 50);
        doc.setFontSize(14).setTextColor(0).text(clean(cmp) || "---", 20, 58);
        
        doc.setFontSize(10).setTextColor(100).text("ATHLETE", 20, 75);
        doc.setFontSize(14).text(`${clean(ath)} (${document.getElementById('sex').value})`, 20, 83);
        
        doc.setFontSize(10).setTextColor(100).text("SHOE DETAILS", 20, 100);
        doc.setFontSize(14).text(`${clean(brd)} - ${clean(document.getElementById('model').value)}`, 20, 108);

        const sigY = 240;
        doc.line(20, sigY, 85, sigY); doc.line(125, sigY, 190, sigY);
        doc.setFontSize(9);
        doc.text(clean(ath) || "---", 52, sigY + 5, {align:'center'});
        doc.text(t.sigA, 52, sigY + 10, {align:'center'});
        doc.text(`${clean(inspN)} (${clean(inspI)})`, 157, sigY + 5, {align:'center'});
        doc.text(t.sigI, 157, sigY + 10, {align:'center'});

        if (sigData.a) doc.addImage(sigData.a, 'PNG', 30, sigY - 25, 45, 20);
        if (sigData.i) doc.addImage(sigData.i, 'PNG', 135, sigY - 25, 45, 20);

        if (validPhotos.length > 0) {
            doc.addPage();
            doc.setFontSize(18).text("PHOTO DOCUMENTATION", 20, 25);
            validPhotos.forEach((item, i) => {
                const col = i % 2, row = Math.floor(i / 2), maxWidth = 80, maxHeight = 50;
                doc.addImage(item.data, 'JPEG', 20 + (col * 90), 40 + (row * 65), maxWidth, maxHeight);
                doc.setFontSize(8).text(item.label, 20 + (col * 90), 40 + (row * 65) + 55);
            });
        }

        doc.save(`${clean(ath).replace(/\s+/g, '_')}_${clean(cmp).replace(/\s+/g, '_')}_${dt || "NoDate"}.pdf`);
        
        let hist = JSON.parse(localStorage.getItem('shoeHistory') || '[]');
        hist.unshift({ name: ath || "N/A", comp: cmp || "N/A", time: now });
        localStorage.setItem('shoeHistory', JSON.stringify(hist.slice(0, 20)));

        // Smart Reset
        document.getElementById('athleteName').value = "";
        document.getElementById('brand').value = "";
        document.getElementById('model').value = "";
        sigData = { a: null, i: null };
        document.getElementById('stat-a').innerText = '❌';
        document.getElementById('stat-i').innerText = '❌';
        document.getElementById('btn-sig-a').classList.remove('signed');
        document.getElementById('btn-sig-i').classList.remove('signed');
        for(let i=1; i<=6; i++) {
            document.getElementById('p'+i).value = "";
            document.getElementById('item-p'+i).classList.remove('has-file');
        }
        otherPhotos = [];
        document.getElementById('otherFileList').innerHTML = "";
        renderHistory();
    };
</script>
</body>
</html>
