<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shoe Check PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 13px; color: #8e8e93; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #d1d1d6; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .photo-item { background: #f9f9fb; border: 1px dashed #c7c7cc; border-radius: 10px; padding: 15px 5px; text-align: center; position: relative; }
        .photo-item input { position: absolute; opacity: 0; width: 100%; height: 100%; top:0; left:0; }
        .sig-container { background: #fff; border: 1px solid #d1d1d6; border-radius: 10px; margin-top: 8px; touch-action: none; }
        canvas { width: 100%; height: 150px; display: block; border-radius: 10px; }
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 700; margin-top: 25px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">Shoe Check</h2>
    <label>Jméno atleta</label><input type="text" id="athleteName">
    <label>Značka / Model</label><input type="text" id="model">
    
    <label>Fotky</label>
    <div class="photo-grid">
        <div class="photo-item">📸 BOK<input type="file" id="p1" accept="image/*" capture="environment"></div>
        <div class="photo-item">📸 PATA<input type="file" id="p2" accept="image/*" capture="environment"></div>
    </div>

    <label>Podpis atleta</label>
    <div class="sig-container"><canvas id="sig-a"></canvas></div>
    <label>Podpis inspektora</label>
    <div class="sig-container"><canvas id="sig-i"></canvas></div>

    <button class="btn-submit" id="generate">VYGENEROVAT PDF</button>
</div>

<script>
    const { jsPDF } = window.jspdf;

    // Inicializace podpisů
    const setup = (id) => {
        const c = document.getElementById(id);
        const p = new SignaturePad(c, { backgroundColor: '#ffffff' });
        const res = () => {
            const r = Math.max(window.devicePixelRatio || 1, 1);
            c.width = c.offsetWidth * r; c.height = c.offsetHeight * r;
            c.getContext("2d").scale(r, r);
            p.clear();
        };
        setTimeout(res, 500); // Počkáme na vykreslení stránky
        return p;
    };

    const padA = setup('sig-a');
    const padI = setup('sig-i');

    // Funkce pro zmenšení obrázku (aby iPhone nezamrzl)
    const resizeImage = (file) => {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 1000; // Max šířka/výška fotky v PDF
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); // Komprese 70%
                };
                img.src = e.target.result;
            };
            if (file) reader.readAsDataURL(file); else resolve(null);
        });
    };

    document.getElementById('generate').onclick = async () => {
        const btn = document.getElementById('generate');
        btn.innerText = "Pracuji...";
        btn.disabled = true;

        try {
            const doc = new jsPDF();
            const athlete = document.getElementById('athleteName').value || "Bez jména";
            
            doc.setFontSize(20);
            doc.text("SHOE CHECK PROTOKOL", 105, 20, { align: "center" });
            doc.setFontSize(12);
            doc.text(`Atlet: ${athlete}`, 20, 40);
            doc.text(`Boty: ${document.getElementById('model').value}`, 20, 50);

            // Podpisy
            if (!padA.isEmpty()) doc.addImage(padA.toDataURL(), 'PNG', 20, 150, 60, 30);
            if (!padI.isEmpty()) doc.addImage(padI.toDataURL(), 'PNG', 120, 150, 60, 30);

            // Fotky
            const img1 = await resizeImage(document.getElementById('p1').files[0]);
            if (img1) { doc.addPage(); doc.text("FOTODOKUMENTACE", 105, 20, { align: "center" }); doc.addImage(img1, 'JPEG', 20, 30, 170, 0); }

            doc.save(`Protokol_${athlete}.pdf`);
        } catch (e) {
            alert("Chyba při generování. Zkuste to znovu.");
        } finally {
            btn.innerText = "VYGENEROVAT PDF";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
