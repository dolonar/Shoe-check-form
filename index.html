<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shoe check form - World Athletics Official Style</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #000000;
            --accent: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-gray: #8e8e93;
            --border: #e5e5ea;
            --input-bg: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Bebas Neue', cursive;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text-main: #f2f2f7;
            --text-gray: #aeaeb2;
            --border: #3a3a3c;
            --input-bg: #2c2c2e;
            --primary: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            margin: 0; padding: 10px;
            color: var(--text-main);
            transition: 0.3s;
            line-height: 1.5;
        }

        .app-header { display: flex; justify-content: center; align-items: center; width: 100%; padding: 30px 0; position: relative; }
        .app-header img { max-width: 180px; height: auto; }
        .header-actions { position: absolute; right: 10px; }

        .icon-btn {
            background: var(--card-bg); border: 1px solid var(--border); padding: 12px;
            border-radius: 14px; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center;
        }

        .card {
            background: var(--card-bg); padding: 25px; border-radius: 28px;
            box-shadow: 0 12px 45px rgba(0,0,0,0.06); max-width: 850px; margin: 0 auto 30px auto; width: 100%;
        }

        .lang-switch { display: flex; gap: 12px; margin-bottom: 25px; justify-content: center; }
        .lang-btn {
            padding: 12px 24px; border-radius: 14px; border: 2px solid var(--border);
            background: transparent; color: var(--text-main); font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
        }
        .lang-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .db-link {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: #e8f5e9; color: #2e7d32; text-decoration: none;
            padding: 20px; border-radius: 18px; font-weight: 800; font-family: var(--font-heading);
            font-size: 20px; margin-bottom: 30px; width: 100%; text-transform: uppercase; 
            border: 2px solid #a5d6a7; transition: 0.2s; letter-spacing: 1px;
        }

        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }

        label { display: block; margin-top: 12px; font-weight: 800; font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1.2px; }
        input, select { 
            width: 100%; padding: 16px; margin-top: 5px; border: 1px solid var(--border); 
            border-radius: 14px; font-size: 16px; background: var(--input-bg); color: var(--text-main); 
            outline: none; font-family: var(--font-main);
        }

        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .photo-item {
            background: var(--input-bg); border: 2px solid var(--border); border-radius: 20px; 
            padding: 25px 10px; text-align: center; position: relative; min-height: 130px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: 800; text-transform: uppercase;
        }
        .photo-item input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }
        .photo-item.has-file { border-color: var(--success); background: rgba(52, 199, 89, 0.1); }
        .photo-item span:first-child { font-size: 36px; margin-bottom: 8px; }

        .sig-trigger {
            width: 100%; padding: 18px; margin-top: 15px; border-radius: 14px; 
            border: 2.5px dashed var(--accent); background: var(--input-bg); 
            color: var(--accent); font-weight: 800; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; font-size: 14px;
        }
        .sig-trigger.signed { border-style: solid; border-color: var(--success); color: var(--success); }

        .btn-submit { 
            background: var(--primary); color: white; border: none; width: 100%; padding: 22px; 
            border-radius: 18px; font-size: 22px; font-weight: 800; cursor: pointer; margin-top: 40px; 
            font-family: var(--font-heading); text-transform: uppercase; letter-spacing: 1.5px;
        }

        .btn-reset { 
            background: transparent; color: var(--danger); border: 2px solid var(--danger); width: 100%; 
            padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; 
            margin-top: 20px; text-transform: uppercase;
        }

        .history-section { margin-top: 40px; border-top: 2px solid var(--border); padding-top: 25px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-title { font-family: var(--font-heading); font-size: 26px; text-transform: uppercase; }

        .history-item {
            background: var(--input-bg); padding: 15px; border-radius: 16px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .modal-body { flex: 1; background: #ffffff; position: relative; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; background: #fff; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-header h3 { font-family: var(--font-heading); font-size: 26px; margin: 0; text-transform: uppercase; }

        .app-footer { text-align: center; padding: 40px 20px; font-size: 10px; color: var(--text-gray); font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="app-content">
    <div class="app-header">
        <img src="https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png" alt="Logo">
        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" id="theme-icon">🌙</button>
        </div>
    </div>

    <div class="card">
        <div class="lang-switch">
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
            <button class="lang-btn" id="btn-cs" onclick="setLang('cs')">Čeština</button>
        </div>

        <a href="https://certcheck.worldathletics.org/" target="_blank" class="db-link" id="db-button">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
            <span id="txt-list-link">LIST OF APPROVED ATHLETIC SHOES</span>
        </a>

        <div class="grid">
            <div><label id="lbl-comp">Competition</label><input type="text" id="compName" list="compOptions"></div>
            <datalist id="compOptions"></datalist>
            <div><label id="lbl-date">Date</label><input type="date" id="raceDate"></div>
        </div>

        <div class="grid">
            <div><label id="lbl-name">Athlete Name</label><input type="text" id="athleteName"></div>
            <div>
                <label id="lbl-sex">Category</label>
                <select id="sex">
                    <option value="Men" id="opt-men">Men</option>
                    <option value="Women" id="opt-women">Women</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label id="lbl-brand">Shoe Brand</label>
                <input type="text" id="brand" list="brandList" oninput="updateModelSuggestions(this.value)">
                <datalist id="brandList"></datalist>
            </div>
            <div>
                <label id="lbl-model">Shoe Model</label>
                <input type="text" id="model" list="modelList">
                <datalist id="modelList"></datalist>
            </div>
        </div>

        <div class="grid">
            <div><label id="lbl-insp-name">Inspector Name</label><input type="text" id="inspName" list="inspOptions" oninput="autoFillId(this.value)"></div>
            <datalist id="inspOptions"></datalist>
            <div><label id="lbl-insp-id">ID Number</label><input type="text" id="inspId"></div>
        </div>

        <div class="photo-grid">
            <div class="photo-item" id="item-p1"><span>📸</span><span id="p-side1">BIB & Shoe</span><input type="file" accept="image/*" onchange="markFilled('p1', this)"></div>
            <div class="photo-item" id="item-p2"><span>📸</span><span id="p-side2">Side View</span><input type="file" accept="image/*" onchange="markFilled('p2', this)"></div>
            <div class="photo-item" id="item-p3"><span>📸</span><span id="p-side3">Outsole</span><input type="file" accept="image/*" onchange="markFilled('p3', this)"></div>
            <div class="photo-item" id="item-p4"><span>📸</span><span id="p-side4">Label</span><input type="file" accept="image/*" onchange="markFilled('p4', this)"></div>
            <div class="photo-item" id="item-p5"><span>📸</span><span id="p-side5">Insole Side</span><input type="file" accept="image/*" onchange="markFilled('p5', this)"></div>
            <div class="photo-item" id="item-p6"><span>📸</span><span id="p-side6">Insole Top</span><input type="file" accept="image/*" onchange="markFilled('p6', this)"></div>
        </div>

        <button class="sig-trigger" id="btn-sig-a" onclick="openSig('a')">
            <span id="txt-sig-a">Athlete Signature</span><span id="stat-a">❌</span>
        </button>
        <button class="sig-trigger" id="btn-sig-i" onclick="openSig('i')">
            <span id="txt-sig-i">Inspector Signature</span><span id="stat-i">❌</span>
        </button>

        <button class="btn-submit" id="btn-gen" onclick="generatePDF()">CREATE REPORT</button>
        <button class="btn-reset" onclick="hardReset()">RESET FORM</button>

        <div class="history-section">
            <div class="history-header">
                <div class="history-title" id="lbl-hist">HISTORY</div>
                <button onclick="clearHistory()" style="background:none; border:none; color:var(--danger); font-weight:800; cursor:pointer; text-transform:uppercase; font-size:12px;">CLEAR</button>
            </div>
            <div id="history-container"></div>
        </div>
    </div>
    <div class="app-footer">Developed by <a href="https://www.instagram.com/doolonar/" target="_blank">David Lux</a> &copy; 2026</div>
</div>

<div id="sigModal" class="modal">
    <div class="modal-header"><h3 id="m-title-label">Signature</h3><button onclick="closeSig()" style="border:none; background:none; font-size:36px;">✕</button></div>
    <div class="modal-body"><canvas id="sigCanvas"></canvas></div>
    <div style="padding:20px; display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <button onclick="clearCanvas()" style="padding:15px; border-radius:12px; border:2px solid var(--danger); background:white; color:var(--danger); font-weight:800; text-transform:uppercase;">Clear</button>
        <button onclick="saveSig()" style="padding:15px; border-radius:12px; border:none; background:var(--success); color:white; font-weight:800; text-transform:uppercase;">Save</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let currentLang = 'cs', sigData = { a: null, i: null }, activePad, activeType;

    // --- KOMPLETNÍ DATABÁZE BOT (Z TVÉHO JSONU) ---
    const shoeDatabase = {
        "Adidas": [
            "Adizero Adios 3", "Adizero Adios 4", "Adizero Adios 5", "Adizero Adios 6", "Adizero Adios 8", "Adizero Adios 9",
            "Adizero Adios Pro", "Adizero Adios Pro 2", "Adizero Adios Pro 3", "Adizero Adios Pro 4", "Adizero Adios Pro Evo 1",
            "Adizero Ambition", "Adizero Avanti", "Adizero Avanti TYO", "Adizero Boston 10", "Adizero Finesse",
            "Adizero Prime SP", "Adizero Prime SP2", "Adizero Takumi Sen 10", "Adizero Takumi Sen 9", "Adizero TJ 2", "Throwstar"
        ],
        "Nike": [
            "Air Zoom Alphafly Next %", "Air Zoom Alphafly Next % 2", "Alphafly 3", "Air Zoom LJ Elite 1.5", "Air Zoom Maxfly",
            "Air Zoom Maxfly 2", "Air Zoom Victory", "Dragonfly 2", "Dragonfly 2 Elite", "High Jump Elite", "LJ Elite",
            "Mamba V6", "Maxfly 2", "Pegasus Plus", "Pegasus Turbo 2", "Streakfly 2", "Triple Jump Elite 3", "Vaporfly 3",
            "Zoom Ja Fly 4", "ZoomX Dragonfly", "ZoomX Streakfly", "ZoomX Vaporfly Next % 3"
        ],
        "Asics": [
            "Cosmoracer LD 2", "Cosmoracer LD 3", "Cosmoracer MD 2", "COSMORACER MD 3", "Cyberblade 16", "Gun Lap 2",
            "Gun Lap 3", "Heat Fly", "HEAT FLY 2", "HEAT THROW", "Heatflat 12", "Heatsprint 13", "High Jump Pro 3",
            "Hyper LD 6", "Hyper MD 8", "Hypersprint 8", "Javelin Pro 4", "JETSPRINT 3", "Long Jump Pro 3", "Magic Speed 3",
            "METASPEED EDGE PARIS", "METASPEED SKY PARIS", "METASPEED SKY+", "Metasprint Tokyo", "Sonicsprint Elite 3", "Throw Pro 3"
        ],
        "Puma": [
            "Berserker Nitro Elite 2", "Deviate Nitro Elite 3", "evoSPEED Distance", "evoSPEED Electric", "evoSPEED High Jump Elite",
            "evoSPEED Javelin", "evoSPEED Long Jump", "evoSPEED Sprint", "evoSPEED Tokyo Future", "FAST-R Nitro Elite 2",
            "Long Distance Nitro Elite 3", "Mid Distance Nitro Elite 3"
        ],
        "New Balance": [
            "FuelCell 5280", "FuelCell PVLSE", "FuelCell RC Elite v2", "FuelCell SuperComp Elite v4", "FuelCell SuperComp MD-X v3",
            "FuelCell SuperComp PWR-X v3", "FuelCell SuperComp SD-X", "LD5K", "SD400", "Sigma Harmony"
        ],
        "Hoka": [
            "Cielo Fly X Elite", "Cielo LD", "Cielo MD", "Cielo Road", "Cielo X1", "Rocket LD", "Rocket X 2", "Rocket X 3"
        ],
        "Saucony": [
            "Endorphin Cheetah", "Endorphin Elite 2", "Endorphin LD", "Endorphin Pro 4", "Havok XC3 Spike", "Kilkenny XC9 Spike",
            "Terminal VT", "Type A9", "Unleash SD 2"
        ],
        "Mizuno": [
            "Chrono Break", "Chrono Dist 7", "Chrono INX9", "Field Geo AJ-C", "Field Geo HJ-C", "Field Geo LJ-C", "Field Geo RD-C",
            "Geo Sprint 4", "Geo Spurt Md", "Wave Duel Pro", "Wave Rebellion Pro 2", "X Blast Elite 3"
        ],
        "Brooks": ["Hyperion Elite 4", "Hyperion Elite LD 2", "Hyperion Elite MD 2", "WIRE 6"],
        "On": ["Cloudboom Echo 3.0", "Cloudboom Strike", "Cloudspike 1500m", "Cloudspike Sprint"],
        "Anta": ["C10 PRO 2.0", "C202 6 PRO"],
        "Xtep": ["160X 6.0 Pro", "160X Elite"],
        "Decathlon": ["KD900X LD", "RW900 V 2"],
        "Under Armour": ["Hovr Shakedown Elite", "Velociti Elite 3"]
    };

    const dictionary = {
        en: { approved: "LIST OF APPROVED ATHLETIC SHOES", comp: "Competition", name: "Athlete Name", sigA: "Athlete Signature", sigI: "Inspector Signature", gen: "CREATE REPORT", hist: "HISTORY", p1: "BIB & Shoe", p2: "Side View", p3: "Outsole", p4: "Label", p5: "Insole Side", p6: "Insole Top", phs: ["Diamond League", "Olympic Games"], names: ["Noah Lyles", "Jakob Ingebrigtsen"] },
        cs: { approved: "SEZNAM SCHVÁLENÉ OBUVI", comp: "Závod", name: "Jméno atleta", sigA: "Podpis atleta", sigI: "Podpis rozhodčího", gen: "VYTVOŘIT PROTOKOL", hist: "HISTORIE", p1: "BIB a bota", p2: "Pohled z boku", p3: "Podrážka", p4: "Štítek", p5: "Vložka bok", p6: "Vložka shora", phs: ["Zlatá tretra", "MČR Praha"], names: ["Jan Novák", "Jakub Vadlejch"] }
    };

    function setLang(lang) {
        currentLang = lang; const t = dictionary[lang];
        document.getElementById('txt-list-link').innerText = t.approved;
        document.getElementById('lbl-comp').innerText = t.comp;
        document.getElementById('lbl-name').innerText = t.name;
        document.getElementById('txt-sig-a').innerText = t.sigA;
        document.getElementById('txt-sig-i').innerText = t.sigI;
        document.getElementById('btn-gen').innerText = t.gen;
        document.getElementById('lbl-hist').innerText = t.hist;
        for(let i=1; i<=6; i++) document.getElementById('p-side'+i).innerText = t['p'+i];
        
        document.getElementById('compName').placeholder = t.phs[Math.floor(Math.random()*t.phs.length)];
        document.getElementById('athleteName').placeholder = t.names[Math.floor(Math.random()*t.names.length)];
        
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('btn-cs').classList.toggle('active', lang === 'cs');
        updateDatalists();
    }

    function toggleTheme() {
        const doc = document.body;
        const isDark = doc.getAttribute('data-theme') === 'dark';
        doc.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
    }

    function updateDatalists() {
        // Brands
        const brandList = document.getElementById('brandList');
        brandList.innerHTML = Object.keys(shoeDatabase).sort().map(b => `<option value="${b}">`).join('');
        
        // Comps History
        const comps = JSON.parse(localStorage.getItem('h_comps') || '[]');
        document.getElementById('compOptions').innerHTML = comps.map(c => `<option value="${c}">`).join('');
        
        // Inspectors History
        const insps = JSON.parse(localStorage.getItem('h_insps') || '[]');
        document.getElementById('inspOptions').innerHTML = insps.map(i => `<option value="${i.name}">`).join('');
    }

    function updateModelSuggestions(val) {
        const modelList = document.getElementById('modelList');
        const modelInput = document.getElementById('model');
        modelList.innerHTML = "";
        
        const brandKey = Object.keys(shoeDatabase).find(k => k.toLowerCase() === val.toLowerCase().trim());
        if(brandKey) {
            const models = shoeDatabase[brandKey].sort();
            modelList.innerHTML = models.map(m => `<option value="${m}">`).join('');
            // Smart random tip
            const randomTip = models[Math.floor(Math.random()*models.length)];
            modelInput.placeholder = (currentLang === 'cs' ? "Např. " : "E.g. ") + randomTip;
        } else {
            modelInput.placeholder = "Model...";
        }
    }

    function autoFillId(val) {
        const insps = JSON.parse(localStorage.getItem('h_insps') || '[]');
        const found = insps.find(i => i.name.toLowerCase() === val.trim().toLowerCase());
        if(found) document.getElementById('inspId').value = found.id;
    }

    const canvas = document.getElementById('sigCanvas');
    function openSig(type) {
        activeType = type;
        document.getElementById('sigModal').classList.add('active');
        setTimeout(() => {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            if(!activePad) activePad = new SignaturePad(canvas, { backgroundColor: 'white' });
            activePad.clear();
            if(sigData[type]) activePad.fromDataURL(sigData[type]);
        }, 100);
    }
    function closeSig() { document.getElementById('sigModal').classList.remove('active'); }
    function clearCanvas() { activePad.clear(); }
    function saveSig() {
        if(!activePad.isEmpty()) {
            sigData[activeType] = activePad.toDataURL();
            document.getElementById('stat-'+activeType).innerText = '✅';
            document.getElementById('btn-sig-'+(activeType === 'a' ? 'a' : 'i')).classList.add('signed');
        }
        closeSig();
    }

    function markFilled(id, input) {
        if(input.files.length > 0) document.getElementById('item-'+id).classList.add('has-file');
    }

    function renderHistory() {
        const hist = JSON.parse(localStorage.getItem('h_logs') || '[]');
        document.getElementById('history-container').innerHTML = hist.map(h => `
            <div class="history-item">
                <div><b>${h.ath}</b><br><small>${h.cmp}</small></div>
                <div style="font-size:11px; color:var(--text-gray);">${h.time}</div>
            </div>
        `).join('');
    }

    function clearHistory() { if(confirm("Smazat historii?")) { localStorage.clear(); location.reload(); } }
    function hardReset() { if(confirm("Reset formuláře?")) location.reload(); }

    const clean = (s) => s ? s.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

    async function generatePDF() {
        const ath = document.getElementById('athleteName').value;
        const cmp = document.getElementById('compName').value;
        const brand = document.getElementById('brand').value;
        const model = document.getElementById('model').value;
        const insp = document.getElementById('inspName').value;
        const inspId = document.getElementById('inspId').value;
        const date = document.getElementById('raceDate').value;

        if(!ath || !cmp || !brand) { alert("Zadej aspoň atleta, závod a značku!"); return; }

        const doc = new jsPDF(), now = new Date().toLocaleString();
        doc.setFontSize(22).setFont("helvetica", "bold").text("SHOE CONTROL REPORT", 20, 25);
        doc.setLineWidth(0.5).line(20, 32, 190, 32);
        
        doc.setFontSize(10).setTextColor(100).text("COMPETITION", 20, 45);
        doc.setFontSize(14).setTextColor(0).text(clean(cmp), 20, 52);
        
        doc.setFontSize(10).setTextColor(100).text("ATHLETE", 20, 65);
        doc.setFontSize(14).text(clean(ath), 20, 72);
        
        doc.setFontSize(10).setTextColor(100).text("SHOE", 20, 85);
        doc.setFontSize(14).text(`${clean(brand)} ${clean(model)}`, 20, 92);

        if(sigData.a) doc.addImage(sigData.a, 'PNG', 20, 240, 45, 20);
        if(sigData.i) doc.addImage(sigData.i, 'PNG', 130, 240, 45, 20);

        doc.save(`${clean(ath).replace(/ /g, '_')}_${clean(cmp).replace(/ /g, '_')}.pdf`);

        // Log to history
        let h_logs = JSON.parse(localStorage.getItem('h_logs') || '[]');
        h_logs.unshift({ ath, cmp, time: now });
        localStorage.setItem('h_logs', JSON.stringify(h_logs.slice(0,10)));
        
        let h_comps = JSON.parse(localStorage.getItem('h_comps') || '[]');
        if(!h_comps.includes(cmp)) h_comps.push(cmp);
        localStorage.setItem('h_comps', JSON.stringify(h_comps));

        let h_insps = JSON.parse(localStorage.getItem('h_insps') || '[]');
        if(!h_insps.some(i => i.name === insp)) h_insps.push({name: insp, id: inspId});
        localStorage.setItem('h_insps', JSON.stringify(h_insps));

        // Smart Reset
        document.getElementById('athleteName').value = "";
        document.getElementById('brand').value = "";
        document.getElementById('model').value = "";
        sigData = {a:null, i:null};
        document.getElementById('stat-a').innerText = '❌';
        document.getElementById('stat-i').innerText = '❌';
        document.querySelectorAll('.sig-trigger').forEach(b => b.classList.remove('signed'));
        renderHistory();
        window.scrollTo(0,0);
    }

    window.onload = () => { setLang('cs'); renderHistory(); };
</script>
</body>
</html>
