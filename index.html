<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shoe Check Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .photo-btn { background: #e1e1e1; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; margin-top: 10px; border: 2px dashed #bbb; }
        #signature-pad { border: 1px solid #000; width: 100%; height: 200px; background: #fff; border-radius: 8px; margin-top: 10px; }
        .btn-submit { background: #007AFF; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; }
        .clear-btn { background: #FF3B30; color: white; border: none; padding: 5px 10px; border-radius: 5px; margin-top: 5px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Shoe Check Form</h2>
    
    <label>Athlete's Name</label>
    <input type="text" id="athleteName" placeholder="Např. Jan Novák">

    <label>Brand & Model</label>
    <input type="text" id="brandModel" placeholder="Např. Nike Vaporfly 3">

    <label>Photo 1 (Side View)</label>
    <input type="file" id="photo1" accept="image/*" capture="environment">

    <label>Signature (Athlete)</label>
    <canvas id="signature-pad"></canvas>
    <button class="clear-btn" id="clear">Smazat podpis</button>

    <button class="btn-submit" id="generate">VYGENEROVAT PDF</button>
</div>

<script>
    const { jsPDF } = window.jspdf;
    
    // Nastavení podpisového pole
    const canvas = document.getElementById('signature-pad');
    const signaturePad = new SignaturePad(canvas);

    // Přizpůsobení velikosti canvasu pro mobil
    function resizeCanvas() {
        const ratio =  Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    document.getElementById('clear').addEventListener('click', () => signaturePad.clear());

    // Generování PDF
    document.getElementById('generate').addEventListener('click', async () => {
        const doc = new jsPDF();
        const name = document.getElementById('athleteName').value;
        const brand = document.getElementById('brandModel').value;

        // Základní text
        doc.setFontSize(22);
        doc.text("Shoe Check Protocol", 105, 20, { align: "center" });
        
        doc.setFontSize(12);
        doc.text(`Athlete: ${name}`, 20, 40);
        doc.text(`Shoe: ${brand}`, 20, 50);
        doc.text(`Date: ${new Date().toLocaleDateString('cs-CZ')}`, 20, 60);

        // Vložení podpisu (pokud existuje)
        if (!signaturePad.isEmpty()) {
            const signatureImg = signaturePad.toDataURL();
            doc.text("Signature:", 20, 150);
            doc.addImage(signatureImg, 'PNG', 20, 155, 50, 25);
        }

        // Vložení fotky (pokud je vybraná)
        const photoInput = document.getElementById('photo1');
        if (photoInput.files && photoInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imgData = e.target.result;
                doc.addPage();
                doc.text("Photo 1:", 20, 20);
                doc.addImage(imgData, 'JPEG', 20, 30, 170, 130);
                doc.save(`Protokol_${name}.pdf`);
            };
            reader.readAsDataURL(photoInput.files[0]);
        } else {
            doc.save(`Protokol_${name}.pdf`);
        }
    });
</script>

</body>
</html>
