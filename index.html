<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shoe check form</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shoe check form">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-gray: #8e8e93;
            --placeholder: #c7c7cc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
            color: #1c1c1e;
            -webkit-font-smoothing: antialiased;
        }

        .app-header {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px 0;
        }

        .app-header img {
            max-width: 180px;
            height: auto;
            border-radius: 10px;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            max-width: 800px;
            margin: 0 auto 20px auto;
        }

        .lang-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .lang-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: white;
        }

        .btn-link {
            display: block;
            background: var(--success);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            margin: 15px 0;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 600px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        label {
            display: block;
            margin-top: 18px;
            font-weight: 700;
            font-size: 11px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin-top: 6px;
            border: 1px solid #d1d1d6;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            background: #fff;
            color: #1c1c1e;
        }

        input::placeholder {
            color: var(--placeholder);
            opacity: 1;
        }

        /* Foto mřížka */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 12px;
        }

        @media (min-width: 768px) {
            .photo-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .photo-item {
            background: #fff;
            border: 2px solid #e5e5ea;
            border-radius: 14px;
            padding: 15px 5px;
            text-align: center;
            position: relative;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .photo-item input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            top: 0;
            left: 0;
        }

        .photo-item.has-file {
            border-color: var(--success);
            background: #f6fff8;
        }

        /* Podpisy */
        .sig-trigger {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border-radius: 14px;
            border: 1.5px dashed var(--primary);
            background: #fff;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sig-trigger.signed {
            border-style: solid;
            border-color: var(--success);
            color: var(--success);
            background: #f6fff8;
        }

        /* Modální okno podpisu */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            display: none;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            flex: 1;
            background: #f9f9f9;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .modal-footer {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* Tlačítka akcí */
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 12px rgba(0,122,255,0.15);
        }

        .btn-reset {
            background: transparent;
            color: var(--danger);
            border: 1.5px solid var(--danger);
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Historie */
        .history-section {
            margin-top: 40px;
            border-top: 2px solid #e5e5ea;
            padding-top: 20px;
        }

        .history-title {
            font-size: 14px;
            color: var(--text-gray);
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background: #fff;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid #e5e5ea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .history-info b {
            display: block;
            color: #1c1c1e;
        }

        .history-info small {
            color: var(--text-gray);
        }

        .history-time {
            font-size: 12px;
            color: var(--placeholder);
        }

        /* Copyright Footer */
        .app-footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 11px;
            color: var(--text-gray);
        }

        .app-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="app-header">
    <img src="https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png" alt="World Athletics">
</div>

<div class="card">
    <div class="lang-switch">
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
        <button class="lang-btn" id="btn-cs" onclick="setLang('cs')">Čeština</button>
    </div>

    <a href="https://certcheck.worldathletics.org/" target="_blank" class="btn-link" id="btn-list">LIST OF APPROVED ATHLETIC SHOES</a>

    <div class="grid">
        <div>
            <label id="lbl-comp">Competition</label>
            <input type="text" id="compName">
        </div>
        <div>
            <label id="lbl-date">Date</label>
            <input type="date" id="raceDate">
        </div>
    </div>

    <div class="grid">
        <div>
            <label id="lbl-name">Athlete Name</label>
            <input type="text" id="athleteName">
        </div>
        <div>
            <label id="lbl-sex">Category</label>
            <select id="sex">
                <option value="Men" id="opt-men">Men</option>
                <option value="Women" id="opt-women">Women</option>
            </select>
        </div>
    </div>

    <div class="grid">
        <div>
            <label id="lbl-brand">Shoe Brand</label>
            <input type="text" id="brand">
        </div>
        <div>
            <label id="lbl-model">Shoe Model</label>
            <input type="text" id="model">
        </div>
    </div>

    <div class="grid">
        <div>
            <label id="lbl-insp-name">Inspector Name</label>
            <input type="text" id="inspName">
        </div>
        <div>
            <label id="lbl-insp-id">ID Number</label>
            <input type="text" id="inspId">
        </div>
    </div>

    <label id="lbl-photo">Photo Documentation</label>
    <div class="photo-grid">
        <div class="photo-item" id="item-p1">
            <span>📸</span><span id="p-side1">BIB & Shoe</span>
            <input type="file" id="p1" accept="image/*" capture="environment" onchange="markFilled('p1')">
        </div>
        <div class="photo-item" id="item-p2">
            <span>📸</span><span id="p-side2">Side View</span>
            <input type="file" id="p2" accept="image/*" capture="environment" onchange="markFilled('p2')">
        </div>
        <div class="photo-item" id="item-p3">
            <span>📸</span><span id="p-side3">Outsole</span>
            <input type="file" id="p3" accept="image/*" capture="environment" onchange="markFilled('p3')">
        </div>
        <div class="photo-item" id="item-p4">
            <span>📸</span><span id="p-side4">Label</span>
            <input type="file" id="p4" accept="image/*" capture="environment" onchange="markFilled('p4')">
        </div>
        <div class="photo-item" id="item-p5">
            <span>📸</span><span id="p-side5">Insole Side</span>
            <input type="file" id="p5" accept="image/*" capture="environment" onchange="markFilled('p5')">
        </div>
        <div class="photo-item" id="item-p6">
            <span>📸</span><span id="p-side6">Insole Top</span>
            <input type="file" id="p6" accept="image/*" capture="environment" onchange="markFilled('p6')">
        </div>
    </div>

    <label id="lbl-other">Other Photos</label>
    <div class="photo-grid">
        <div class="photo-item" id="item-p7">
            <span>📸</span><span id="p-other1">Other Photo 1</span>
            <input type="file" id="p7" accept="image/*" capture="environment" onchange="markFilled('p7')">
        </div>
        <div class="photo-item" id="item-p8">
            <span>📸</span><span id="p-other2">Other Photo 2</span>
            <input type="file" id="p8" accept="image/*" capture="environment" onchange="markFilled('p8')">
        </div>
        <div class="photo-item" id="item-p9">
            <span>📸</span><span id="p-other3">Other Photo 3</span>
            <input type="file" id="p9" accept="image/*" capture="environment" onchange="markFilled('p9')">
        </div>
        <div class="photo-item" id="item-p10">
            <span>📸</span><span id="p-other4">Other Photo 4</span>
            <input type="file" id="p10" accept="image/*" capture="environment" onchange="markFilled('p10')">
        </div>
    </div>

    <label id="lbl-sig-title">Authentication</label>
    <button class="sig-trigger" id="btn-sig-a" onclick="openSig('a')">
        <span id="txt-sig-a">Athlete's Signature</span>
        <span id="stat-a">❌</span>
    </button>
    <button class="sig-trigger" id="btn-sig-i" onclick="openSig('i')">
        <span id="txt-sig-i">Inspector's Signature</span>
        <span id="stat-i">❌</span>
    </button>

    <button class="btn-submit" id="btn-gen">CREATE REPORT</button>
    <div style="margin-top:20px; text-align:center;">
        <button class="btn-reset" onclick="confirmReset()" id="btn-reset">RESET FORM</button>
    </div>

    <div class="history-section">
        <div class="history-title" id="lbl-hist">HISTORY</div>
        <div id="history-list" class="history-list"></div>
    </div>
</div>

<div class="app-footer">
    Developed & Designed by <a href="https://www.instagram.com/doolonar/" target="_blank">David Lux</a> &copy; 2026
</div>

<div id="sigModal" class="modal">
    <div class="modal-header">
        <h3 id="m-title">Signature</h3>
        <button onclick="closeSig()" style="border:none; background:none; font-size:24px; cursor:pointer;">✕</button>
    </div>
    <div class="modal-body">
        <canvas id="sigCanvas"></canvas>
    </div>
    <div class="modal-footer">
        <button class="btn-reset" onclick="activePad.clear()" id="m-clear">Clear</button>
        <button class="btn-submit" style="margin:0; padding:12px" onclick="saveSig()" id="m-save">Save</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let currentLang = 'en';
    let sigData = { a: null, i: null };
    let activePad, activeType;

    const translations = {
        en: { 
            title: "SHOE CONTROL REPORT", 
            btnList: "LIST OF APPROVED ATHLETIC SHOES", 
            comp: "Competition", 
            date: "Date", 
            athlete: "Athlete", 
            sex: "Sex", 
            men: "Men", 
            women: "Women", 
            brand: "Shoe Brand", 
            model: "Shoe Model", 
            photo: "Photo Documentation", 
            other: "Other Photos",
            p1: "BIB & Shoe", p2: "Side View", p3: "Outsole", p4: "Label", p5: "Insole Side", p6: "Insole Top", 
            p7: "Other Photo 1", p8: "Other Photo 2", p9: "Other Photo 3", p10: "Other Photo 4",
            sigTitle: "Authentication", 
            sigA: "Athlete Signature", 
            sigI: "Inspector Signature", 
            gen: "CREATE REPORT", 
            reset: "RESET FORM", 
            mClear: "Clear", 
            mSave: "Save Signature", 
            confirm: "Clear all data?", 
            hist: "HISTORY", 
            check: "DOCUMENTS ATTACHED", 
            inspName: "Inspector Name", 
            inspId: "ID Number", 
            phComp: "Event Name", 
            phAthlete: "Full Name", 
            phBrand: "e.g. Nike", 
            phModel: "e.g. Vaporfly 3", 
            phInsp: "Name", 
            phId: "ID"
        },
        cs: { 
            title: "PROTOKOL KONTROLY OBUVI", 
            btnList: "SEZNAM SCHVÁLENÉ OBUVI", 
            comp: "Závod", 
            date: "Datum", 
            athlete: "Atlet", 
            sex: "Kategorie", 
            men: "Muži", 
            women: "Ženy", 
            brand: "Značka obuvi", 
            model: "Model obuvi", 
            photo: "Fotodokumentace", 
            other: "Další fotografie",
            p1: "Startovní číslo a bota", p2: "Pohled z boku", p3: "Podrážka", p4: "Štítek", p5: "Vložka (bok)", p6: "Vložka (shora)", 
            p7: "Další foto 1", p8: "Další foto 2", p9: "Další foto 3", p10: "Další foto 4",
            sigTitle: "Ověření", 
            sigA: "Podpis atleta", 
            sigI: "Podpis rozhodčího", 
            gen: "VYTVOŘIT PROTOKOL", 
            reset: "VYMAZAT FORMULÁŘ", 
            mClear: "Smazat", 
            mSave: "Uložit podpis", 
            confirm: "Opravdu vymazat všechna data?", 
            hist: "HISTORIE", 
            check: "PŘILOŽENÁ DOKUMENTACE", 
            inspName: "Jméno rozhodčího", 
            inspId: "Průkaz (číslo)", 
            phComp: "např. Zlatá tretra", 
            phAthlete: "Jméno a příjmení", 
            phBrand: "např. Nike", 
            phModel: "např. Vaporfly 3", 
            phInsp: "Jméno a příjmení", 
            phId: "Číslo"
        }
    };

    const removeDiacritics = (str) => str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";

    function setLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        document.getElementById('btn-cs').classList.toggle('active', lang === 'cs');
        
        document.getElementById('btn-list').innerText = t.btnList;
        document.getElementById('lbl-comp').innerText = t.comp; 
        document.getElementById('lbl-date').innerText = t.date;
        document.getElementById('lbl-name').innerText = t.athlete; 
        document.getElementById('lbl-sex').innerText = t.sex;
        document.getElementById('lbl-brand').innerText = t.brand; 
        document.getElementById('lbl-model').innerText = t.model;
        document.getElementById('lbl-insp-name').innerText = t.inspName; 
        document.getElementById('lbl-insp-id').innerText = t.inspId;
        document.getElementById('lbl-photo').innerText = t.photo; 
        document.getElementById('lbl-other').innerText = t.other;
        document.getElementById('lbl-sig-title').innerText = t.sigTitle;
        document.getElementById('txt-sig-a').innerText = t.sigA; 
        document.getElementById('txt-sig-i').innerText = t.sigI;
        document.getElementById('btn-gen').innerText = t.gen; 
        document.getElementById('btn-reset').innerText = t.reset;
        document.getElementById('lbl-hist').innerText = t.hist;
        
        document.getElementById('opt-men').innerText = t.men;
        document.getElementById('opt-women').innerText = t.women;
        
        document.getElementById('compName').placeholder = t.phComp; 
        document.getElementById('athleteName').placeholder = t.phAthlete;
        document.getElementById('brand').placeholder = t.phBrand; 
        document.getElementById('model').placeholder = t.phModel;
        document.getElementById('inspName').placeholder = t.phInsp; 
        document.getElementById('inspId').placeholder = t.phId;

        document.getElementById('m-clear').innerText = t.mClear;
        document.getElementById('m-save').innerText = t.mSave;

        // Překlad fotek
        document.getElementById('p-side1').innerText = t.p1;
        document.getElementById('p-side2').innerText = t.p2;
        document.getElementById('p-side3').innerText = t.p3;
        document.getElementById('p-side4').innerText = t.p4;
        document.getElementById('p-side5').innerText = t.p5;
        document.getElementById('p-side6').innerText = t.p6;
        document.getElementById('p-other1').innerText = t.p7;
        document.getElementById('p-other2').innerText = t.p8;
        document.getElementById('p-other3').innerText = t.p9;
        document.getElementById('p-other4').innerText = t.p10;

        renderHistory();
    }

    // Podpisový pad
    const canvas = document.getElementById('sigCanvas');
    activePad = new SignaturePad(canvas, { backgroundColor: 'white' });

    function openSig(type) {
        activeType = type;
        const t = translations[currentLang];
        document.getElementById('m-title').innerText = (type === 'a' ? t.sigA : t.sigI);
        document.getElementById('sigModal').classList.add('active');
        
        // Fix rozlišení
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        activePad.clear();
        if(sigData[type]) activePad.fromDataURL(sigData[type]);
    }

    function saveSig() {
        if (!activePad.isEmpty()) {
            sigData[activeType] = activePad.toDataURL();
            document.getElementById('stat-' + activeType).innerText = '✅';
            document.getElementById('btn-sig-' + activeType).classList.add('signed');
        }
        closeSig();
    }

    function closeSig() {
        document.getElementById('sigModal').classList.remove('active');
    }

    function markFilled(id) {
        const input = document.getElementById(id);
        const item = document.getElementById('item-' + id);
        item.classList.toggle('has-file', input.files.length > 0);
    }

    async function processImg(file) {
        if (!file) return null;
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas');
                    const ctx = c.getContext('2d');
                    // Optimalizace pro PDF
                    c.width = 1000;
                    c.height = 750;
                    ctx.drawImage(img, 0, 0, 1000, 750);
                    resolve(c.toDataURL('image/jpeg', 0.8));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        const hist = JSON.parse(localStorage.getItem('shoeHistory') || '[]');
        list.innerHTML = hist.map(h => `
            <div class="history-item">
                <div class="history-info">
                    <b>${h.name}</b>
                    <small>${h.comp}</small>
                </div>
                <div class="history-time">${h.time}</div>
            </div>
        `).join('');
    }

    function confirmReset() {
        if(confirm(translations[currentLang].confirm)) location.reload();
    }

    document.getElementById('btn-gen').onclick = async () => {
        const t = translations.en; // PDF je vždy anglicky
        const athleteRaw = document.getElementById('athleteName').value;
        const compRaw = document.getElementById('compName').value;
        const brandRaw = document.getElementById('brand').value;
        const modelRaw = document.getElementById('model').value;
        const inspNameRaw = document.getElementById('inspName').value;
        const inspIdRaw = document.getElementById('inspId').value;
        
        const athlete = removeDiacritics(athleteRaw);
        const comp = removeDiacritics(compRaw);
        const brand = removeDiacritics(brandRaw);
        const model = removeDiacritics(modelRaw);
        const inspName = removeDiacritics(inspNameRaw);
        const inspId = removeDiacritics(inspIdRaw);

        const doc = new jsPDF();
        const now = new Date().toLocaleString('en-GB');
        const logo = "https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png";

        // Pole pro fotky
        const photos = ['p1','p2','p3','p4','p5','p6','p7','p8','p9','p10'];
        const pLabels = [t.p1, t.p2, t.p3, t.p4, t.p5, t.p6, t.p7, t.p8, t.p9, t.p10];
        
        const validPhotos = [];
        for (let i = 0; i < photos.length; i++) {
            const f = document.getElementById(photos[i]).files[0];
            if (f) {
                const imgData = await processImg(f);
                validPhotos.push({ data: imgData, label: pLabels[i] });
            }
        }

        const drawFooter = () => {
            doc.setFontSize(8).setTextColor(150);
            doc.text(`Generated: ${now} | David Lux Control System`, 190, 285, {align: 'right'});
        };

        // --- STRANA 1 ---
        doc.addImage(logo, 'PNG', 150, 10, 40, 20);
        doc.setFontSize(22).setFont("helvetica", "bold").text(t.title, 20, 25);
        doc.setDrawColor(0, 122, 255).setLineWidth(1).line(20, 35, 190, 35);

        doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text(t.comp.toUpperCase(), 20, 50);
        doc.setFontSize(14).setTextColor(0).setFont("helvetica", "normal").text(comp || "---", 20, 58);

        doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text(t.date.toUpperCase(), 150, 50);
        doc.setFontSize(14).setTextColor(0).setFont("helvetica", "normal").text(document.getElementById('raceDate').value || "---", 150, 58);

        doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text(t.athlete.toUpperCase(), 20, 75);
        doc.setFontSize(14).setTextColor(0).text(`${athlete} (${document.getElementById('sex').value})`, 20, 83);

        doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text("SHOE DETAILS", 20, 100);
        doc.setFontSize(14).setTextColor(0).text(`${brand} - ${model}`, 20, 108);

        // Checklist
        doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text(t.check, 20, 125);
        doc.setFontSize(9).setTextColor(0).setFont("helvetica", "normal");
        
        photos.forEach((id, i) => {
            const hasFile = document.getElementById(id).files.length > 0;
            const xOffset = (i > 4) ? 80 : 0;
            const yOffset = (i % 5) * 7;
            doc.text(`${hasFile ? "[X]" : "[  ]"}  ${pLabels[i]}`, 25 + xOffset, 135 + yOffset);
        });

        // Podpisy
        const sigY = 240;
        doc.setDrawColor(180).line(20, sigY, 85, sigY);
        doc.line(125, sigY, 190, sigY);
        
        doc.setFontSize(9).setTextColor(100);
        doc.text(t.sigA, 52, sigY + 5, {align:'center'});
        
        // Inspector Info
        doc.text(`${inspName} (${inspId})`, 157, sigY + 5, {align:'center'});
        doc.text(t.sigI, 157, sigY + 9, {align:'center'});

        if(sigData.a) doc.addImage(sigData.a, 'PNG', 27, sigY - 25, 45, 20);
        if(sigData.i) doc.addImage(sigData.i, 'PNG', 135, sigY - 25, 45, 20);
        
        drawFooter();

        // --- STRANA 2 (Fotky - jen pokud existují) ---
        if (validPhotos.length > 0) {
            doc.addPage();
            doc.addImage(logo, 'PNG', 150, 10, 40, 20);
            doc.setFontSize(18).setFont("helvetica", "bold").setTextColor(0).text(t.photo, 20, 25);
            doc.setDrawColor(0, 122, 255).setLineWidth(0.5).line(20, 32, 190, 32);

            validPhotos.forEach((item, i) => {
                const x = 20 + (i % 2 * 90);
                const y = 40 + (Math.floor(i / 2) * 48);
                doc.addImage(item.data, 'JPEG', x, y, 80, 40);
                doc.setFontSize(8).setTextColor(120).text(item.label, x, y + 44);
            });
            drawFooter();
        }

        // Uložit PDF
        doc.save(`${athlete.replace(/\s+/g, '_')}_Report.pdf`);

        // Uložit do historie
        let hist = JSON.parse(localStorage.getItem('shoeHistory') || '[]');
        hist.unshift({
            name: athleteRaw || "Unknown Athlete",
            comp: compRaw || "Unknown Competition",
            time: now
        });
        localStorage.setItem('shoeHistory', JSON.stringify(hist.slice(0, 20)));

        // Reload
        setTimeout(() => location.reload(), 1000);
    };

    window.onload = () => setLang('cs');
</script>
</body>
</html>
