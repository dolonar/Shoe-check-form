<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shoe Check PRO Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #f2f2f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1c1c1e; }
        .card { background: white; padding: 20px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 13px; color: #8e8e93; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #d1d1d6; border-radius: 10px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; }
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .photo-item { background: #f9f9fb; border: 1px dashed #c7c7cc; border-radius: 10px; padding: 12px 5px; text-align: center; position: relative; font-size: 12px; }
        .photo-item input { position: absolute; opacity: 0; width: 100%; height: 100%; top:0; left:0; cursor: pointer; }
        .sig-container { background: #fff; border: 1px solid #d1d1d6; border-radius: 10px; margin-top: 8px; touch-action: none; }
        canvas { width: 100%; height: 140px; display: block; border-radius: 10px; }
        .btn-clear { background: none; border: none; color: #FF3B30; font-size: 11px; padding: 5px; cursor: pointer; width: 100%; text-align: right; }
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 700; margin-top: 20px; cursor: pointer; }
        .btn-submit:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-top:0;">Shoe Check Protokol</h2>
    
    <label>Název závodu</label>
    <input type="text" id="compName" placeholder="Např. Poděbrady Walking">

    <div class="grid">
        <div><label>Datum závodu</label><input type="date" id="raceDate"></div>
        <div><label>Pohlaví</label><select id="sex"><option value="Muži">Muži</option><option value="Ženy">Ženy</option></select></div>
    </div>

    <label>Jméno atleta</label><input type="text" id="athleteName" placeholder="Celé jméno">
    <label>Disciplína</label><input type="text" id="event" placeholder="Např. 20km chůze">

    <div class="grid">
        <div><label>Značka</label><input type="text" id="brand" placeholder="Nike"></div>
        <div><label>Model</label><input type="text" id="model" placeholder="Vaporfly 3"></div>
    </div>

    <label>Fotodokumentace</label>
    <div class="photo-grid">
        <div class="photo-item">📸 Z boku<input type="file" id="p1" accept="image/*" capture="environment"></div>
        <div class="photo-item">📸 Podrážka<input type="file" id="p2" accept="image/*" capture="environment"></div>
        <div class="photo-item">📸 Pata<input type="file" id="p3" accept="image/*" capture="environment"></div>
        <div class="photo-item">📸 Štítek<input type="file" id="p4" accept="image/*" capture="environment"></div>
        <div class="photo-item">📸 Vložka<input type="file" id="p5" accept="image/*" capture="environment"></div>
    </div>

    <label>Poznámky</label>
    <textarea id="notes" rows="2" placeholder="Povoleno / Nepovoleno..."></textarea>

    <label>Podpis atleta</label>
    <div class="sig-container"><canvas id="sig-a"></canvas></div>
    <button class="btn-clear" type="button" onclick="padA.clear()">Smazat podpis</button>

    <label>Podpis inspektora</label>
    <div class="sig-container"><canvas id="sig-i"></canvas></div>
    <button class="btn-clear" type="button" onclick="padI.clear()">Smazat podpis</button>

    <button class="btn-submit" id="generate">VYGENEROVAT PDF</button>
</div>

<script>
    const { jsPDF } = window.jspdf;

    const setupPad = (id) => {
        const c = document.getElementById(id);
        const p = new SignaturePad(c, { backgroundColor: '#ffffff', penColor: '#000000' });
        const res = () => {
            const r = Math.max(window.devicePixelRatio || 1, 1);
            c.width = c.offsetWidth * r; c.height = c.offsetHeight * r;
            c.getContext("2d").scale(r, r);
            p.clear();
        };
        window.addEventListener("resize", res);
        setTimeout(res, 500);
        return p;
    };

    const padA = setupPad('sig-a');
    const padI = setupPad('sig-i');

    const resizeImg = (file) => {
        return new Promise((res) => {
            if (!file) return res(null);
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 1200;
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.75));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    };

    document.getElementById('generate').onclick = async () => {
        const btn = document.getElementById('generate');
        btn.innerText = "Generuji..."; btn.disabled = true;

        try {
            const doc = new jsPDF();
            const dateStr = new Date().toLocaleDateString('cs-CZ');
            const data = {
                comp: document.getElementById('compName').value || "Zavod",
                date: document.getElementById('raceDate').value || "-",
                athlete: document.getElementById('athleteName').value || "Neznamy_Atlet",
                sex: document.getElementById('sex').value,
                event: document.getElementById('event').value || "-",
                brand: document.getElementById('brand').value || "-",
                model: document.getElementById('model').value || "-",
                notes: document.getElementById('notes').value || "Bez poznamek"
            };

            // --- STRANA 1: DESIGN ---
            doc.setFillColor(0, 122, 255); doc.rect(20, 15, 170, 2, 'F');
            doc.setFont("helvetica", "bold"); doc.setFontSize(22);
            doc.text("SHOE CHECK PROTOCOL", 20, 30);
            doc.setFontSize(10); doc.setFont("", "normal");
            doc.text(`Issued: ${dateStr}`, 190, 35, { align: "right" });

            let y = 50;
            doc.setDrawColor(0); doc.setLineWidth(0.5); doc.line(20, y, 190, y);

            const addRow = (label, value) => {
                y += 8; doc.setFont("", "bold"); doc.text(label + ":", 25, y);
                doc.setFont("", "normal"); doc.text(String(value), 75, y);
                y += 4; doc.setDrawColor(200); doc.setLineWidth(0.1); doc.line(20, y, 190, y);
            };

            addRow("Competition", data.comp);
            addRow("Race Date", data.date);
            addRow("Athlete", data.athlete);
            addRow("Event / Sex", `${data.event} / ${data.sex}`);
            addRow("Shoe Brand", data.brand);
            addRow("Shoe Model", data.model);

            y += 15;
            doc.setFillColor(245, 245, 245); doc.rect(20, y, 170, 25, 'F');
            doc.setFont("", "bold"); doc.text("TECHNICAL NOTES / DECISION:", 25, y + 8);
            doc.setFont("", "normal"); doc.text(data.notes, 25, y + 16, { maxWidth: 160 });

            // --- FOTODOKUMENTACE STATUS (POD SEBOU) ---
            y += 35;
            doc.setFont("", "bold"); doc.setFontSize(10);
            
            const check = (id) => document.getElementById(id).files[0] ? "[ X ]" : "[   ]";
            
            doc.text(`${check('p1')} Side View Photo Captured`, 25, y); y += 6;
            doc.text(`${check('p2')} Outsole Photo Captured`, 25, y); y += 6;
            doc.text(`${check('p3')} Heel Photo Captured`, 25, y); y += 6;
            doc.text(`${check('p4')} Label Photo Captured`, 25, y); y += 6;
            doc.text(`${check('p5')} Insole Photo Captured`, 25, y);

            // Podpisy
            y = 235; doc.setDrawColor(0); doc.setLineWidth(0.5);
            doc.rect(20, y, 80, 40); doc.setFontSize(8); doc.text("ATHLETE'S SIGNATURE", 60, y + 35, { align: "center" });
            if (!padA.isEmpty()) doc.addImage(padA.toDataURL(), 'PNG', 25, y + 5, 70, 25);

            doc.rect(110, y, 80, 40); doc.text("OFFICIAL INSPECTOR", 150, y + 35, { align: "center" });
            if (!padI.isEmpty()) doc.addImage(padI.toDataURL(), 'PNG', 115, y + 5, 70, 25);

            // --- STRANA 2: FOTKY ---
            const photos = ['p1', 'p2', 'p3', 'p4', 'p5'];
            const labels = ['SIDE VIEW', 'OUTSOLE', 'HEEL', 'LABEL', 'INSOLE'];
            let hasPhotos = false;
            for(let id of photos) if(document.getElementById(id).files[0]) hasPhotos = true;

            if (hasPhotos) {
                doc.addPage();
                doc.setFillColor(0, 122, 255); doc.rect(20, 15, 170, 2, 'F');
                doc.setFont("", "bold"); doc.setFontSize(18); doc.text("PHOTO DOCUMENTATION", 20, 30);
                
                let py = 45, count = 0;
                for (let i = 0; i < photos.length; i++) {
                    const img = await resizeImg(document.getElementById(photos[i]).files[0]);
                    if (img) {
                        const x = (count % 2 === 0) ? 20 : 110;
                        doc.setFontSize(9); doc.text(labels[i], x, py - 3);
                        doc.setDrawColor(230); doc.rect(x, py, 80, 60);
                        doc.addImage(img, 'JPEG', x, py, 80, 60);
                        if (count % 2 === 1) py += 75;
                        count++;
                        if (count % 6 === 0 && count < photos.length) { doc.addPage(); py = 45; }
                    }
                }
            }

            // --- FORMÁT NÁZVU SOUBORU ---
            const fileName = `${data.comp}_${data.athlete}`.replace(/\s+/g, '_');
            doc.save(`${fileName}.pdf`);
            
        } catch (e) { alert("Chyba při generování."); console.error(e); }
        btn.innerText = "VYGENEROVAT PDF"; btn.disabled = false;
    };
</script>
</body>
</html>
