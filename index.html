<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Shoe check form</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #000000;
            --accent: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-gray: #8e8e93;
            --border: #e5e5ea;
            --input-bg: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Bebas Neue', cursive;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text-main: #f2f2f7;
            --text-gray: #aeaeb2;
            --border: #3a3a3c;
            --input-bg: #2c2c2e;
            --primary: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: var(--font-main);
            background: var(--bg);
            margin: 0;
            padding: 10px;
            color: var(--text-main);
            transition: background 0.3s, color 0.3s;
        }

        .app-header { display: flex; justify-content: center; align-items: center; width: 100%; padding: 25px 0; position: relative; }
        .app-header img { max-width: 170px; height: auto; }

        .header-actions { position: absolute; right: 10px; }
        .icon-btn {
            background: var(--card-bg); border: 1px solid var(--border); padding: 10px;
            border-radius: 14px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
        }

        .card {
            background: var(--card-bg); padding: 25px; border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05); max-width: 850px; margin: 0 auto 20px auto; width: 100%;
        }

        .lang-switch { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .lang-btn {
            padding: 10px 20px; border-radius: 12px; border: 2px solid var(--border);
            background: transparent; color: var(--text-main); font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 11px;
        }
        .lang-btn.active { background: var(--primary); color: var(--card-bg); border-color: var(--primary); }

        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }

        label { display: block; margin-top: 15px; font-weight: 800; font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { 
            width: 100%; padding: 16px; margin-top: 5px; border: 1px solid var(--border); 
            border-radius: 14px; font-size: 16px; background: var(--input-bg); color: var(--text-main); 
            outline: none; font-family: var(--font-main);
        }

        /* FOTO TLAČÍTKA - MASIVNÍ */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .photo-item {
            background: var(--input-bg); border: 2px solid var(--border); border-radius: 18px; padding: 30px 10px;
            text-align: center; position: relative; min-height: 140px; display: flex;
            flex-direction: column; align-items: center; justify-content: center; 
            font-size: 15px; font-weight: 800; text-transform: uppercase;
        }
        .photo-item span:first-child { font-size: 36px; margin-bottom: 10px; }
        .photo-item.has-file { border-color: var(--success); background: rgba(52, 199, 89, 0.05); }

        .add-photo-btn {
            width: 100%; padding: 25px; border-radius: 18px; border: 2px dashed var(--border);
            background: var(--input-bg); color: var(--text-gray); font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 15px;
            font-size: 15px; text-transform: uppercase;
        }

        /* SIGNATURE BUTTONS */
        .sig-trigger {
            width: 100%; padding: 20px; margin-top: 12px; border-radius: 14px; 
            border: 2.5px dashed var(--accent); background: var(--input-bg); 
            color: var(--accent); font-weight: 800; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 15px; text-transform: uppercase;
        }
        .sig-trigger.signed { border-style: solid; border-color: var(--success); color: var(--success); }

        /* MAIN ACTIONS */
        .btn-submit { 
            background: var(--primary); color: var(--card-bg); border: none; width: 100%; padding: 24px; 
            border-radius: 20px; font-size: 24px; font-weight: 800; cursor: pointer; margin-top: 40px; 
            font-family: var(--font-heading); letter-spacing: 1.5px; text-transform: uppercase;
        }

        .btn-reset { 
            background: transparent; color: var(--danger); border: 2px solid var(--danger); width: 100%; 
            padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; 
            margin-top: 20px; text-transform: uppercase;
        }

        /* MODALS */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .modal-body { flex: 1; background: #ffffff; position: relative; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; background: #fff; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-header h3 { font-family: var(--font-heading); font-size: 26px; margin: 0; text-transform: uppercase; }

        .history-section { margin-top: 40px; border-top: 2px solid var(--border); padding-top: 20px; }
        .history-item { padding: 15px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 8px; font-size: 14px; }
    </style>
</head>
<body>

<div id="app-content">
    <div class="app-header">
        <img src="https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png" alt="Logo">
        <div class="header-actions">
            <div class="icon-btn" onclick="toggleTheme()" id="theme-icon">🌙</div>
        </div>
    </div>

    <div class="card">
        <div class="lang-switch">
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
            <button class="lang-btn" id="btn-cs" onclick="setLang('cs')">Čeština</button>
        </div>

        <div class="grid">
            <div><label id="lbl-comp">Competition</label><input type="text" id="compName" placeholder="Závod..."></div>
            <div><label id="lbl-date">Date</label><input type="date" id="raceDate"></div>
        </div>

        <div class="grid">
            <div><label id="lbl-name">Athlete Name</label><input type="text" id="athleteName" placeholder="Jméno atleta..."></div>
            <div>
                <label id="lbl-sex">Category</label>
                <select id="sex">
                    <option value="Men">Men</option>
                    <option value="Women">Women</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div><label id="lbl-brand">Shoe Brand</label><input type="text" id="brand" placeholder="Značka..." oninput="suggestModel(this.value)"></div>
            <div><label id="lbl-model">Shoe Model</label><input type="text" id="model" placeholder="Model..."></div>
        </div>

        <div class="grid">
            <div><label id="lbl-insp-name">Inspector Name</label><input type="text" id="inspName" placeholder="Jméno rozhodčího..."></div>
            <div><label id="lbl-insp-id">ID Number</label><input type="text" id="inspId" placeholder="Číslo průkazu..."></div>
        </div>

        <div class="photo-grid">
            <div class="photo-item" id="item-p1"><span>📸</span><span id="p-side1">BIB & Shoe</span><input type="file" id="p1" accept="image/*" capture="environment" onchange="markFilled('p1')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p2"><span>📸</span><span id="p-side2">Side View</span><input type="file" id="p2" accept="image/*" capture="environment" onchange="markFilled('p2')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p3"><span>📸</span><span id="p-side3">Outsole</span><input type="file" id="p3" accept="image/*" capture="environment" onchange="markFilled('p3')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p4"><span>📸</span><span id="p-side4">Label</span><input type="file" id="p4" accept="image/*" capture="environment" onchange="markFilled('p4')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p5"><span>📸</span><span id="p-side5">Insole Side</span><input type="file" id="p5" accept="image/*" capture="environment" onchange="markFilled('p5')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
            <div class="photo-item" id="item-p6"><span>📸</span><span id="p-side6">Insole Top</span><input type="file" id="p6" accept="image/*" capture="environment" onchange="markFilled('p6')" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;"></div>
        </div>

        <div class="add-photo-btn">
            <span id="txt-add-other">+ Add Extra Photo</span>
            <input type="file" accept="image/*" capture="environment" onchange="handleOtherPhoto(this)" style="position:absolute; opacity:0; width:100%; height:100%; cursor:pointer;">
        </div>

        <button class="sig-trigger" id="btn-sig-a" onclick="openSig('a')">
            <span id="txt-sig-a">Athlete Signature</span><span id="stat-a">❌</span>
        </button>
        <button class="sig-trigger" id="btn-sig-i" onclick="openSig('i')">
            <span id="txt-sig-i">Inspector Signature</span><span id="stat-i">❌</span>
        </button>

        <button class="btn-submit" id="btn-gen">CREATE REPORT</button>
        <button class="btn-reset" onclick="confirmFullReset()">RESET ALL</button>

        <div class="history-section">
            <div class="history-header"><div class="history-title">HISTORY</div></div>
            <div id="history-list"></div>
        </div>
    </div>
</div>

<div id="sigModal" class="modal">
    <div class="modal-header"><h3 id="m-title">Signature</h3><button onclick="closeSig()" style="border:none; background:none; font-size:36px;">✕</button></div>
    <div class="modal-body"><canvas id="sigCanvas"></canvas></div>
    <div style="padding:20px; display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <button onclick="activePad.clear()" style="padding:20px; border-radius:14px; border:2px solid var(--danger); color:var(--danger); font-weight:800; background:#fff;">CLEAR</button>
        <button onclick="saveSig()" style="padding:20px; border-radius:14px; border:none; background:var(--success); color:white; font-weight:800;">SAVE</button>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    let currentLang = 'cs', sigData = { a: null, i: null }, activePad, activeType;

    const shoeDatabase = {
        "Adidas": ["Adizero Adios Pro 3", "Adizero Avanti TYO", "Adizero Prime SP2", "Adizero Ambition"],
        "Nike": ["Air Zoom Victory", "Air Zoom Maxfly 2", "ZoomX Dragonfly 2", "Vaporfly 3", "Alphafly 3"],
        "Asics": ["Metaspeed Sky Paris", "Metaspeed Edge Paris", "Cosmoracer LD 2"],
        "Puma": ["Berserker Nitro Elite 2", "evoSPEED Sprint", "evoSPEED Tokyo Future"]
    };

    function toggleTheme() {
        const isDark = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('theme-icon').innerText = isDark ? '🌙' : '☀️';
    }

    function suggestModel(brand) {
        const modelInput = document.getElementById('model');
        const brandKey = Object.keys(shoeDatabase).find(k => k.toLowerCase() === brand.toLowerCase().trim());
        if (brandKey) {
            const models = shoeDatabase[brandKey];
            const random = models[Math.floor(Math.random() * models.length)];
            modelInput.placeholder = (currentLang === 'cs' ? "Zkus např. " : "Try e.g. ") + random;
        }
    }

    // --- SIGNATURES (FIXED) ---
    function openSig(type) {
        activeType = type;
        document.getElementById('sigModal').classList.add('active');
        
        const canvas = document.getElementById('sigCanvas');
        // Musíme počkat na vykreslení modalu, než nastavíme velikost canvasu
        setTimeout(() => {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            
            if (!activePad) {
                activePad = new SignaturePad(canvas, { backgroundColor: 'rgb(255, 255, 255)' });
            }
            activePad.clear();
            if (sigData[type]) activePad.fromDataURL(sigData[type]);
        }, 100);
    }

    function saveSig() {
        if (activePad && !activePad.isEmpty()) {
            sigData[activeType] = activePad.toDataURL();
            document.getElementById('stat-' + activeType).innerText = '✅';
            document.getElementById('btn-sig-' + activeType).classList.add('signed');
        }
        closeSig();
    }

    function closeSig() { document.getElementById('sigModal').classList.remove('active'); }

    function markFilled(id) { document.getElementById('item-' + id).classList.add('has-file'); }
    function confirmFullReset() { if(confirm("Smazat vše?")) location.reload(); }

    const clean = (str) => str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "";
    
    document.getElementById('btn-gen').onclick = async () => {
        const ath = document.getElementById('athleteName').value;
        const cmp = document.getElementById('compName').value;
        const brand = document.getElementById('brand').value;
        if (!ath || !cmp || !brand) { alert("Doplň Závod, Atleta a Značku!"); return; }

        const doc = new jsPDF(), now = new Date().toLocaleString('en-GB');
        doc.setFontSize(22).text("SHOE CONTROL REPORT", 20, 25);
        doc.setFontSize(14).text(`Competition: ${clean(cmp)}`, 20, 45);
        doc.text(`Athlete: ${clean(ath)}`, 20, 55);
        doc.text(`Shoe: ${clean(brand)} - ${clean(document.getElementById('model').value)}`, 20, 65);

        if (sigData.a) doc.addImage(sigData.a, 'PNG', 20, 200, 50, 25);
        if (sigData.i) doc.addImage(sigData.i, 'PNG', 130, 200, 50, 25);

        doc.save(`${clean(ath)}_${clean(cmp)}.pdf`);
        
        // Reset atleta a bot
        document.getElementById('athleteName').value = "";
        document.getElementById('brand').value = "";
        document.getElementById('model').value = "";
        sigData = { a: null, i: null };
        document.getElementById('stat-a').innerText = '❌';
        document.getElementById('stat-i').innerText = '❌';
        document.getElementById('btn-sig-a').classList.remove('signed');
        document.getElementById('btn-sig-i').classList.remove('signed');
    };

    function setLang(l) {
        currentLang = l;
        // Zde si můžeš dopisovat překlady labelů podle potřeby
    }
</script>
</body>
</html>
