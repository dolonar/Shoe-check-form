<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shoe check form</title>
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/7x5Srxp1/Gemini-Generated-Image-3kqcbr3kqcbr3kqc.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #000000;
            --accent: #007AFF;
            --success: #34C759;
            --danger: #FF3B30;
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #1c1c1e;
            --text-gray: #8e8e93;
            --border: #e5e5ea;
            --input-bg: #ffffff;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Bebas Neue', cursive;
            --btn-main-bg: #000000;
            --btn-main-txt: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --text-main: #f2f2f7;
            --text-gray: #aeaeb2;
            --border: #3a3a3c;
            --input-bg: #2c2c2e;
            --primary: #ffffff;
            --btn-main-bg: #ffffff;
            --btn-main-txt: #000000;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font-main); }
        body { background: var(--bg); margin: 0; padding: 10px; color: var(--text-main); transition: 0.3s; line-height: 1.5; }

        .app-header { display: flex; justify-content: center; align-items: center; width: 100%; padding: 30px 0; position: relative; }
        .app-header img { max-width: 180px; height: auto; }
        .header-actions { position: absolute; right: 10px; }

        .icon-btn { background: var(--card-bg); border: 1px solid var(--border); padding: 12px; border-radius: 14px; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; }

        .card { background: var(--card-bg); padding: 25px; border-radius: 28px; box-shadow: 0 12px 45px rgba(0,0,0,0.06); max-width: 850px; margin: 0 auto 30px auto; width: 100%; }

        .lang-switch { display: flex; gap: 12px; margin-bottom: 25px; justify-content: center; }
        .lang-btn { padding: 12px 24px; border-radius: 14px; border: 2px solid var(--border); background: transparent; color: var(--text-main); font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .lang-btn.active { background: var(--btn-main-bg); color: var(--btn-main-txt); border-color: var(--btn-main-bg); }

        .db-link { display: flex; align-items: center; justify-content: center; gap: 12px; background: #e8f5e9; color: #2e7d32; text-decoration: none; padding: 20px; border-radius: 18px; font-weight: 800; font-family: var(--font-heading); font-size: 20px; margin-bottom: 8px; width: 100%; text-transform: uppercase; border: 2px solid #a5d6a7; transition: 0.2s; letter-spacing: 1px; }
        .db-update-info { text-align: center; font-size: 11px; color: var(--text-gray); margin-bottom: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .grid { grid-template-columns: 1fr 1fr; } }

        label { display: block; margin-top: 12px; font-weight: 800; font-size: 10px; color: var(--text-gray); text-transform: uppercase; letter-spacing: 1.2px; }
        
        /* FIX PRO IPAD - Napevno nastavená výška a smazáno nativní zobrazení */
        input, select { 
            width: 100%; 
            height: 54px; 
            padding: 0 16px; 
            margin-top: 5px; 
            border: 1px solid var(--border); 
            border-radius: 14px; 
            font-size: 16px; 
            background: var(--input-bg); 
            color: var(--text-main); 
            outline: none; 
            -webkit-appearance: none; 
            appearance: none; 
        }

        .info-box { display: none; margin-top: 15px; padding: 20px; border-radius: 16px; background: rgba(0, 122, 255, 0.05); border: 1px solid rgba(0, 122, 255, 0.2); }
        .info-text { font-size: 13px; font-weight: 600; margin-bottom: 15px; }
        .approval-btns { display: flex; gap: 10px; }
        .appr-btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 13px; cursor: pointer; text-transform: uppercase; transition: 0.2s; background: var(--input-bg); color: var(--text-main); border: 2px solid var(--border); }
        .appr-btn.yes.active { background: var(--success); color: white; border-color: var(--success); }
        .appr-btn.no.active { background: var(--danger); color: white; border-color: var(--danger); }

        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .photo-item { background: var(--input-bg); border: 2px solid var(--border); border-radius: 20px; padding: 30px 10px; text-align: center; position: relative; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .photo-item input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }
        .photo-item.has-file { border-color: var(--success); background: rgba(52, 199, 89, 0.1); }
        .photo-item span:first-child { font-size: 36px; margin-bottom: 8px; }

        .add-photo-btn { width: 100%; padding: 22px; border-radius: 18px; border: 2px dashed var(--border); background: var(--input-bg); color: var(--text-gray); font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 15px; font-size: 14px; text-transform: uppercase; position: relative; }
        .add-photo-btn input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        
        .other-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; justify-content: center; }
        .other-tag { background: var(--accent); color: white; padding: 10px 14px; border-radius: 12px; font-size: 12px; font-weight: 800; display: flex; align-items: center; gap: 8px; }

        .sig-trigger { width: 100%; padding: 20px; margin-top: 15px; border-radius: 14px; border: 2.5px dashed var(--accent); background: var(--input-bg); color: var(--accent); font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; font-size: 15px; }
        .sig-trigger.signed { border-style: solid; border-color: var(--success); color: var(--success); }

        .btn-submit { background: var(--btn-main-bg); color: var(--btn-main-txt); border: none; width: 100%; padding: 24px; border-radius: 20px; font-size: 24px; font-weight: 800; cursor: pointer; margin-top: 40px; font-family: var(--font-heading); text-transform: uppercase; letter-spacing: 1.5px; }

        .history-section { margin-top: 40px; border-top: 3px solid var(--border); padding-top: 25px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-title { font-family: var(--font-heading); font-size: 28px; text-transform: uppercase; }
        .history-item { background: var(--input-bg); padding: 18px; border-radius: 18px; border: 1px solid var(--border); display: flex; justify-content: space-between; margin-bottom: 10px; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: none; flex-direction: column; }
        .modal.active { display: flex; }
        .modal-body { flex: 1; background: var(--card-bg); position: relative; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; background: transparent; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-header h3 { font-family: var(--font-heading); font-size: 26px; margin: 0; text-transform: uppercase; }

        .app-footer { text-align: center; padding: 40px 20px; font-size: 10px; color: var(--text-gray); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .app-footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>

<div id="app-content">
    <div class="app-header">

        <div class="header-actions">
            <button class="icon-btn" onclick="toggleTheme()" id="theme-icon">🌙</button>
        </div>
    </div>

    <div class="card">
        <div class="lang-switch">
            <button class="lang-btn" id="btn-en" onclick="setLang('en')">English</button>
            <button class="lang-btn" id="btn-cs" onclick="setLang('cs')">Čeština</button>
        </div>

        <a href="https://certcheck.worldathletics.org/" target="_blank" class="db-link" id="db-button">
            <span id="txt-list-link">LIST OF APPROVED ATHLETIC SHOES</span>
        </a>
        <div class="db-update-info" id="txt-db-update">Offline Database Updated: April 2026</div>

        <div class="grid">
            <div><label id="lbl-comp">Competition</label><input type="text" id="compName" list="compOptions" placeholder="Závod..." autocomplete="new-password"></div>
            <datalist id="compOptions"></datalist>
            <div><label id="lbl-date">Date</label><input type="date" id="raceDate"></div>
        </div>

        <div class="grid">
            <div><label id="lbl-name">Athlete Name</label><input type="text" id="athleteName" placeholder="Jan Novák..." autocomplete="new-password"></div>
            <div>
                <label id="lbl-sex">Category</label>
                <select id="sex">
                    <option value="Men" id="opt-men">Men</option>
                    <option value="Women" id="opt-women">Women</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div>
                <label id="lbl-disc">Discipline</label>
                <input type="text" id="discipline" placeholder="Např. 100m, Skok do dálky..." autocomplete="new-password">
            </div>
            <div>
                <label id="lbl-serial">Serial Number (Sériové číslo)</label>
                <input type="text" id="serialNum" placeholder="Např. D24Q2R011M..." oninput="handleSerialSearch(this.value)" autocomplete="new-password">
            </div>
        </div>

        <div class="grid">
            <div>
                <label id="lbl-brand">Shoe Brand</label>
                <input type="text" id="brand" list="brandList" placeholder="Značka..." oninput="handleBrandChange(this.value)" autocomplete="new-password">
                <datalist id="brandList"></datalist>
            </div>
            <div>
                <label id="lbl-model">Shoe Model</label>
                <input type="text" id="model" list="modelList" placeholder="Model..." oninput="checkShoeInfo()" onchange="checkShoeInfo()" autocomplete="new-password">
                <datalist id="modelList"></datalist>
            </div>
        </div>

        <div id="shoeInfoBox" class="info-box">
            <div id="shoeAllowedFor" class="info-text"></div>
            <label id="lbl-appr-q" style="margin-top:0; font-size:11px; margin-bottom: 8px;">Závodí v povolené obuvi pro tuto disciplínu?</label>
            <div class="approval-btns">
                <button type="button" id="btn-appr-yes" class="appr-btn yes" onclick="setApproval(true)">✅ POVOLENO</button>
                <button type="button" id="btn-appr-no" class="appr-btn no" onclick="setApproval(false)">❌ NEPOVOLENO</button>
            </div>
        </div>

        <div>
            <label id="lbl-insp-name">Inspector Name</label>
            <input type="text" id="inspName" placeholder="Inspektor..." autocomplete="new-password">
        </div>

        <div class="photo-grid">
            <div class="photo-item" id="item-p1"><span>📸</span><span id="p-side1">BIB & Shoe</span><input type="file" id="p1" accept="image/*" capture="environment" onchange="markFilled('p1', this)"></div>
            <div class="photo-item" id="item-p2"><span>📸</span><span id="p-side2">Side View</span><input type="file" id="p2" accept="image/*" capture="environment" onchange="markFilled('p2', this)"></div>
            <div class="photo-item" id="item-p3"><span>📸</span><span id="p-side3">Outsole</span><input type="file" id="p3" accept="image/*" capture="environment" onchange="markFilled('p3', this)"></div>
            <div class="photo-item" id="item-p4"><span>📸</span><span id="p-side4">Label</span><input type="file" id="p4" accept="image/*" capture="environment" onchange="markFilled('p4', this)"></div>
            <div class="photo-item" id="item-p5"><span>📸</span><span id="p-side5">Insole Side</span><input type="file" id="p5" accept="image/*" capture="environment" onchange="markFilled('p5', this)"></div>
            <div class="photo-item" id="item-p6"><span>📸</span><span id="p-side6">Insole Top</span><input type="file" id="p6" accept="image/*" capture="environment" onchange="markFilled('p6', this)"></div>
        </div>

        <div class="add-photo-btn">
            <span id="txt-add-other">+ Add Extra Photo</span>
            <input type="file" accept="image/*" capture="environment" onchange="handleOtherPhoto(this)">
        </div>
        <div id="otherFileList" class="other-list"></div>

        <button class="sig-trigger" id="btn-sig-a" onclick="openSig('a')">
            <span id="txt-sig-a">Athlete Signature</span><span id="stat-a">❌</span>
        </button>
        <button class="sig-trigger" id="btn-sig-i" onclick="openSig('i')">
            <span id="txt-sig-i">Inspector Signature</span><span id="stat-i">❌</span>
        </button>

        <button class="btn-submit" id="btn-gen" onclick="generatePDF()">CREATE REPORT</button>

        <div class="history-section">
            <div class="history-header">
                <div class="history-title" id="lbl-hist">HISTORY</div>
                <button onclick="clearHistory()" id="btn-clear" style="background:none; border:none; color:var(--danger); font-weight:800; cursor:pointer;">CLEAR</button>
            </div>
            <div id="history-container"></div>
        </div>
    </div>
    
    <div class="app-footer">Developed and designed by <a href="https://www.instagram.com/doolonar/" target="_blank">David Lux</a> &copy; 2026</div>
</div>

<div id="sigModal" class="modal">
    <div class="modal-header">
        <h3 id="m-title-label">Signature</h3>
        <button onclick="closeSig()" style="border:none; background:none; font-size:36px; color:var(--text-main); cursor:pointer; padding:0; line-height:1;">✕</button>
    </div>
    <div class="modal-body"><canvas id="sigCanvas"></canvas></div>
    <div style="padding:20px; display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <button onclick="clearCanvas()" id="btn-sig-clear" style="padding:15px; border-radius:12px; border:2px solid var(--danger); background:var(--input-bg); color:var(--danger); font-weight:800;">CLEAR</button>
        <button onclick="saveSig()" id="btn-sig-save" style="padding:15px; border-radius:12px; border:none; background:var(--success); color:white; font-weight:800;">SAVE</button>
    </div>
</div>

    function updateDatalists() {
        document.getElementById('brandList').innerHTML = Object.keys(shoeDB).sort().map(b => `<option value="${b}">`).join('');

    function handleSerialSearch(val) {
        const cleanVal = val.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        if (serialDB[cleanVal]) {
            const match = serialDB[cleanVal];
            document.getElementById('brand').value = match.b;
            handleBrandChange(match.b);
            document.getElementById('model').value = match.m;
            checkShoeInfo();
        }
    }

    function handleBrandChange(val) {
        const modelList = document.getElementById('modelList');
        const modelInput = document.getElementById('model');
        modelList.innerHTML = "";
        const brandKey = Object.keys(shoeDB).find(k => k.toLowerCase() === val.toLowerCase().trim());
        if(brandKey) {
            const models = Object.keys(shoeDB[brandKey]).sort();
            modelList.innerHTML = models.map(m => `<option value="${m}">`).join('');
            modelInput.placeholder = (currentLang === 'cs' ? "Např. " : "E.g. ") + models[Math.floor(Math.random()*models.length)];
        } else {
            modelInput.placeholder = "Model...";
        }
        checkShoeInfo();
    }

    function checkShoeInfo() {
        const brand = document.getElementById('brand').value.trim();
        const model = document.getElementById('model').value.trim();
        const infoBox = document.getElementById('shoeInfoBox');
        const infoText = document.getElementById('shoeAllowedFor');
        const t = dictionary[currentLang];
        
        setApproval(null);

        const bKey = Object.keys(shoeDB).find(k => k.toLowerCase() === brand.toLowerCase());
        if(bKey && shoeDB[bKey][model]) {
            const rules = shoeDB[bKey][model];
            let texts = [];
            if(rules[0].includes('T')) texts.push('Track (Dráha)');
            if(rules[0].includes('J')) texts.push('Jump (Skoky)');
            if(rules[0].includes('H')) texts.push('Throw (Vrhy)');
            if(rules[0].includes('R')) texts.push('Road (Silnice)');
            
            const msg = currentLang === 'cs' ? "Oficiálně schváleno pro:" : "Officially approved for:";
            infoText.innerHTML = `${msg}<br><span style="color:var(--accent); font-size:16px;">${texts.join(', ')}</span>`;
            infoBox.style.display = 'block';
        } else if (brand && model) {
            infoText.innerHTML = t.notFoundWA + `<br><a href="https://certcheck.worldathletics.org/" target="_blank" style="color:var(--accent); text-decoration:underline; display:inline-block; margin-top:8px;">certcheck.worldathletics.org</a>`;
            infoBox.style.display = 'block';
        } else {
            infoBox.style.display = 'none';
        }
    }

        isShoeApproved = status;
        const btnY = document.getElementById('btn-appr-yes');
        const btnN = document.getElementById('btn-appr-no');
        
        btnY.classList.remove('active');
        btnN.classList.remove('active');
        
        if(status === true) btnY.classList.add('active');
        if(status === false) btnN.classList.add('active');
    }

    const canvas = document.getElementById('sigCanvas');
    function openSig(type) {
        activeType = type;
        document.getElementById('sigModal').classList.add('active');
        setTimeout(() => {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            if(!activePad) activePad = new SignaturePad(canvas, { backgroundColor: 'white' });
            activePad.clear();
            if(sigData[type]) activePad.fromDataURL(sigData[type]);
        }, 100);
    }
    function closeSig() { document.getElementById('sigModal').classList.remove('active'); }

        if(!activePad.isEmpty()) {
            sigData[activeType] = activePad.toDataURL();
            document.getElementById('stat-'+activeType).innerText = '✅';
            document.getElementById('btn-sig-'+(activeType === 'a' ? 'a' : 'i')).classList.add('signed');

                    const ctx = c.getContext('2d');
                    c.width = img.width; c.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    resolve({ data: c.toDataURL('image/jpeg', 0.8), w: img.width, h: img.height });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    async function generatePDF() {
        try {
            const ath = document.getElementById('athleteName').value;
            const cmp = document.getElementById('compName').value;
            const brd = document.getElementById('brand').value;
            const mdl = document.getElementById('model').value;
            const insp = document.getElementById('inspName').value;
            const date = document.getElementById('raceDate').value;
            const sex = document.getElementById('sex').value;
            const discText = document.getElementById('discipline').value;

            if(!ath || !cmp || !brd) { 
                alert(currentLang === 'cs' ? "Chybí údaje (Závod, Atlet, Značka)!" : "Missing details (Competition, Athlete, Brand)!"); 
                return; 
            }

            const doc = new jsPDF();
            const now = new Date().toLocaleString();
            const logo = "https://upload.wikimedia.org/wikipedia/en/c/ce/World_Athletics_Championships.png";

            const validPhotos = [];
            for (let i = 1; i <= 6; i++) { 
                const f = document.getElementById('p'+i).files[0]; 
                if (f) validPhotos.push({ ...await processImg(f), label: pdfLabels['p'+i] }); 
            }
            for (let i = 0; i < otherPhotos.length; i++) {
                validPhotos.push({ ...await processImg(otherPhotos[i]), label: "Extra Photo " + (i + 1) });
            }

            // --- STRANA 1: PROFESIONÁLNÍ REPORT ---
            doc.addImage(logo, 'PNG', 140, 10, 50, 25);
            doc.setFontSize(24).setFont("helvetica", "bold").setTextColor(0);
            doc.text("SHOE CONTROL REPORT", 20, 25);
            
            doc.setDrawColor(0, 122, 255).setLineWidth(1).line(20, 38, 190, 38);
            
            const leftCol = 20;
            const rightCol = 115;
            let y = 50;

            doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text("COMPETITION", leftCol, y);
            doc.setFontSize(10).setTextColor(120).text("DATE", rightCol, y);
            y += 6;
            doc.setFontSize(14).setTextColor(0).setFont("helvetica", "normal").text(clean(cmp), leftCol, y);
            doc.setFontSize(14).setTextColor(0).text(date || "---", rightCol, y);
            y += 12;

            doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text("ATHLETE", leftCol, y);
            doc.setFontSize(10).setTextColor(120).text("CATEGORY", rightCol, y);
            y += 6;
            doc.setFontSize(14).setTextColor(0).setFont("helvetica", "normal").text(clean(ath), leftCol, y);
            doc.setFontSize(14).setTextColor(0).text(sex, rightCol, y);
            y += 15;

            doc.setLineWidth(0.2).setDrawColor(220).line(20, y, 190, y);
            y += 10;

            doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text("SHOE BRAND & MODEL", leftCol, y);
            y += 6;
            doc.setFontSize(14).setTextColor(0).setFont("helvetica", "bold").text(`${clean(brd)} ${clean(mdl)}`, leftCol, y);
            y += 10;

            doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text("DECLARED DISCIPLINE", leftCol, y);
            y += 6;
            doc.setFontSize(14).setTextColor(0).setFont("helvetica", "normal").text(clean(discText) || "---", leftCol, y);
            y += 10;

            if (isShoeApproved === false) {
                doc.setFontSize(14).setTextColor(255, 0, 0).setFont("helvetica", "bold");
                doc.text("STATUS: SHOE NOT APPROVED FOR THIS DISCIPLINE", leftCol, y);
            } else if (isShoeApproved === true) {
                doc.setFontSize(12).setTextColor(0, 150, 0).setFont("helvetica", "bold");
                doc.text("STATUS: APPROVED", leftCol, y);
            }
            y += 15;

            doc.setLineWidth(0.2).setDrawColor(220).line(20, y, 190, y);
            y += 10;

            doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text("INSPECTOR NAME", leftCol, y);
            y += 6;
            doc.setFontSize(14).setTextColor(0).setFont("helvetica", "normal").text(clean(insp) || "---", leftCol, y);
            y += 15;

            doc.setFontSize(10).setTextColor(120).setFont("helvetica", "bold").text("ATTACHED PHOTO DOCUMENTATION", leftCol, y);
            y += 8;
            doc.setFontSize(11).setTextColor(0).setFont("helvetica", "normal");
            
            for(let i=1; i<=6; i++) {
                const has = document.getElementById('p'+i).files.length > 0;
                doc.text(`${has ? "[ X ]" : "[   ]"}  ${pdfLabels['p'+i]}`, leftCol, y); 
                y += 8;
            }
            if (otherPhotos.length > 0) {
                doc.text(`[ X ]  Extra Photos: ${otherPhotos.length}`, leftCol, y);
            }

            const sigY = 260;
            doc.setDrawColor(150).setLineWidth(0.5);
            doc.line(20, sigY, 90, sigY); 
            doc.line(120, sigY, 190, sigY);
            
            doc.setFontSize(10).setFont("helvetica", "bold").setTextColor(0);
            doc.text(clean(ath) || "---", 55, sigY + 5, {align:'center'});
            doc.text(clean(insp) || "---", 155, sigY + 5, {align:'center'});

            doc.setFontSize(8).setTextColor(120).setFont("helvetica", "normal");
            doc.text("ATHLETE SIGNATURE", 55, sigY + 10, {align:'center'});
            doc.text("INSPECTOR SIGNATURE", 155, sigY + 10, {align:'center'});

            if(sigData.a) doc.addImage(sigData.a, 'PNG', 25, sigY - 25, 60, 20);
            if(sigData.i) doc.addImage(sigData.i, 'PNG', 125, sigY - 25, 60, 20);

            doc.setFontSize(8).setTextColor(180).setFont("helvetica", "normal").text(`Generated securely: ${now}`, 190, 285, {align:'right'});

            // --- STRANA 2: FOTKY ---
            if (validPhotos.length > 0) {
                doc.addPage();
                doc.setFontSize(22).setFont("helvetica", "bold").setTextColor(0).text("PHOTO DOCUMENTATION", 20, 25);
                doc.setDrawColor(0, 122, 255).setLineWidth(1).line(20, 32, 190, 32);

                let row = 0, col = 0;
                validPhotos.forEach((item, i) => {
                    if (i > 0 && i % 6 === 0) { doc.addPage(); row = 0; col = 0; }
                    
                    const maxW = 75, maxH = 55;
                    let fW = maxW, fH = (item.h * maxW) / item.w;
                    if (fH > maxH) { fH = maxH; fW = (item.w * maxH) / item.h; }
                    
                    const xP = 25 + (col * 85), yP = 45 + (row * 75);
                    const xO = (maxW - fW) / 2;
                    
                    doc.setDrawColor(200).setLineWidth(0.5).rect(xP, yP, maxW, maxH);
                    doc.addImage(item.data, 'JPEG', xP + xO, yP + (maxH - fH) / 2, fW, fH);
                    doc.setFontSize(10).setFont("helvetica", "bold").setTextColor(0).text(item.label, xP + (maxW/2), yP + maxH + 7, {align:'center'});

                    col++; if (col > 1) { col = 0; row++; }
                });
            }

            doc.save(`${clean(ath).replace(/ /g, '_')}_${clean(cmp).replace(/ /g, '_')}.pdf`);

            let h_logs = JSON.parse(localStorage.getItem('h_logs') || '[]'); h_logs.unshift({ ath, cmp, time: now }); localStorage.setItem('h_logs', JSON.stringify(h_logs.slice(0,15)));
            let h_comps = JSON.parse(localStorage.getItem('h_comps') || '[]'); if(!h_comps.includes(cmp)) h_comps.push(cmp); localStorage.setItem('h_comps', JSON.stringify(h_comps));

            document.getElementById('athleteName').value = ""; document.getElementById('brand').value = ""; document.getElementById('model').value = ""; document.getElementById('discipline').value = ""; document.getElementById('serialNum').value = "";
            sigData = {a:null, i:null}; document.getElementById('stat-a').innerText = '❌'; document.getElementById('stat-i').innerText = '❌'; document.getElementById('shoeInfoBox').style.display = 'none'; setApproval(null);
            document.querySelectorAll('.sig-trigger').forEach(b => b.classList.remove('signed'));
            for(let i=1; i<=6; i++) { document.getElementById('p'+i).value = ""; document.getElementById('item-p'+i).classList.remove('has-file'); }
            otherPhotos = []; document.getElementById('otherFileList').innerHTML = "";
            renderHistory(); window.scrollTo(0,0);
            
        } catch (error) {
            console.error(error);
            alert("Došlo k chybě při generování: " + error.message);
        }
    }

    window.onload = () => { 
        setLang('cs'); 
        renderHistory(); 
    };
</script>
